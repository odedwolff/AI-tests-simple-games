<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top-Down Vehicle</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #1b1d22;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  canvas {
    background: #2c2f36;
    border: 2px solid #4a4d55;
    border-radius: 6px;
    display: block;
  }

  #hud {
    color: #9aa0aa;
    font-size: 13px;
    letter-spacing: 0.3px;
    display: flex;
    gap: 24px;
  }

  #hud b {
    color: #e3e6ea;
  }

  .key {
    display: inline-block;
    border: 1px solid #5a5e68;
    border-radius: 4px;
    padding: 1px 6px;
    margin: 0 2px;
    background: #3a3d45;
    color: #d6d9de;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="game" width="900" height="600"></canvas>
  <div id="hud">
    <div><span class="key">&uarr;</span><span class="key">&darr;</span> drive / reverse &nbsp; <span class="key">&larr;</span><span class="key">&rarr;</span> steer</div>
    <div>speed: <b id="speedVal">0.0</b></div>
    <div>steer: <b id="steerVal">0&deg;</b></div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ---------- Vehicle parameters ----------
  const BODY_LENGTH   = 70;   // distance between front axle and rear axle (the "I" stem)
  const TRACK_WIDTH   = 44;   // distance between left and right wheel centers
  const WHEEL_LENGTH  = 18;   // wheel rectangle length (along its rolling direction)
  const WHEEL_WIDTH   = 7;    // wheel rectangle width
  const MAX_STEER_DEG = 38;   // max steering angle in degrees
  const STEER_RATE    = 110;  // degrees per second the wheel angle changes
  const STEER_RETURN  = 140;  // degrees per second wheels self-center when no input

  const MAX_SPEED     = 180;  // px/sec forward
  const MAX_REVERSE   = -90;  // px/sec reverse
  const ACCEL         = 140;  // px/sec^2 when accelerating
  const DECEL         = 220;  // px/sec^2 when braking/reversing input opposes motion
  const FRICTION      = 90;   // px/sec^2 natural slow-down when no throttle input

  // ---------- Vehicle state ----------
  const car = {
    x: W / 2,
    y: H / 2,
    heading: -Math.PI / 2,  // radians; 0 = facing +x (east). Start facing "up" (north).
    speed: 0,               // px/sec, signed (negative = reverse)
    steerAngle: 0           // degrees, signed (negative = left, positive = right)
  };

  // ---------- Input ----------
  const keys = { up: false, down: false, left: false, right: false };

  window.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': keys.up = true; e.preventDefault(); break;
      case 'ArrowDown': keys.down = true; e.preventDefault(); break;
      case 'ArrowLeft': keys.left = true; e.preventDefault(); break;
      case 'ArrowRight': keys.right = true; e.preventDefault(); break;
    }
  });

  window.addEventListener('keyup', (e) => {
    switch (e.key) {
      case 'ArrowUp': keys.up = false; e.preventDefault(); break;
      case 'ArrowDown': keys.down = false; e.preventDefault(); break;
      case 'ArrowLeft': keys.left = false; e.preventDefault(); break;
      case 'ArrowRight': keys.right = false; e.preventDefault(); break;
    }
  });

  // ---------- Update ----------
  let lastTime = null;

  function update(dt) {
    // Steering: left/right change steerAngle around its own center,
    // independent of whether the car is moving.
    if (keys.left && !keys.right) {
      car.steerAngle -= STEER_RATE * dt;
    } else if (keys.right && !keys.left) {
      car.steerAngle += STEER_RATE * dt;
    } else {
      // self-center toward 0 when no steering input
      if (car.steerAngle > 0) {
        car.steerAngle = Math.max(0, car.steerAngle - STEER_RETURN * dt);
      } else if (car.steerAngle < 0) {
        car.steerAngle = Math.min(0, car.steerAngle + STEER_RETURN * dt);
      }
    }
    car.steerAngle = Math.max(-MAX_STEER_DEG, Math.min(MAX_STEER_DEG, car.steerAngle));

    // Throttle: up = accelerate forward, down = accelerate backward.
    if (keys.up && !keys.down) {
      car.speed += ACCEL * dt;
    } else if (keys.down && !keys.up) {
      car.speed -= DECEL * dt;
    } else {
      // friction brings speed toward 0
      if (car.speed > 0) {
        car.speed = Math.max(0, car.speed - FRICTION * dt);
      } else if (car.speed < 0) {
        car.speed = Math.min(0, car.speed + FRICTION * dt);
      }
    }
    car.speed = Math.max(MAX_REVERSE, Math.min(MAX_SPEED, car.speed));

    // Bicycle model: front wheels steer at car.steerAngle relative to heading.
    // The car rotates around the rear axle based on speed and steer angle.
    if (Math.abs(car.speed) > 0.01) {
      const steerRad = car.steerAngle * Math.PI / 180;

      // Rear axle position (pivot for the simple bicycle model)
      const rearX = car.x - Math.cos(car.heading) * (BODY_LENGTH / 2);
      const rearY = car.y - Math.sin(car.heading) * (BODY_LENGTH / 2);

      // Move rear axle along current heading
      const newRearX = rearX + Math.cos(car.heading) * car.speed * dt;
      const newRearY = rearY + Math.sin(car.heading) * car.speed * dt;

      // Heading change rate depends on speed & steer angle (bicycle model)
      const headingDelta = (car.speed / BODY_LENGTH) * Math.tan(steerRad) * dt;
      car.heading += headingDelta;

      // Recompute car center as forward of the new rear axle by half body length
      car.x = newRearX + Math.cos(car.heading) * (BODY_LENGTH / 2);
      car.y = newRearY + Math.sin(car.heading) * (BODY_LENGTH / 2);
    }

    // Keep car within world bounds (simple clamp + stop)
    const margin = BODY_LENGTH;
    if (car.x < margin) { car.x = margin; car.speed = 0; }
    if (car.x > W - margin) { car.x = W - margin; car.speed = 0; }
    if (car.y < margin) { car.y = margin; car.speed = 0; }
    if (car.y > H - margin) { car.y = H - margin; car.speed = 0; }
  }

  // ---------- Drawing helpers ----------
  function drawRectAt(cx, cy, angle, length, width, fillStyle, strokeStyle) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = fillStyle;
    if (strokeStyle) {
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = 1.5;
    }
    ctx.beginPath();
    ctx.rect(-length / 2, -width / 2, length, width);
    ctx.fill();
    if (strokeStyle) ctx.stroke();
    ctx.restore();
  }

  function drawCar() {
    const halfBody = BODY_LENGTH / 2;
    const halfTrack = TRACK_WIDTH / 2;

    // Local-space axle center offsets (before applying car.heading)
    // front axle is "ahead" along heading, rear axle is "behind"
    const cosH = Math.cos(car.heading);
    const sinH = Math.sin(car.heading);

    // perpendicular direction (for left/right offset across the track)
    const perpX = -sinH;
    const perpY = cosH;

    const frontCenterX = car.x + cosH * halfBody;
    const frontCenterY = car.y + sinH * halfBody;
    const rearCenterX  = car.x - cosH * halfBody;
    const rearCenterY  = car.y - sinH * halfBody;

    // --- Body: the "I" stem connecting front and rear axle centers ---
    ctx.save();
    ctx.strokeStyle = '#6fd1ff';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(rearCenterX, rearCenterY);
    ctx.lineTo(frontCenterX, frontCenterY);
    ctx.stroke();
    ctx.restore();

    // --- Rear axle bar (the bottom dash of the I) ---
    drawRectAt(
      rearCenterX, rearCenterY,
      car.heading + Math.PI / 2,
      TRACK_WIDTH, 3,
      '#3d4250', null
    );

    // --- Front axle bar (the top dash of the I) ---
    drawRectAt(
      frontCenterX, frontCenterY,
      car.heading + Math.PI / 2,
      TRACK_WIDTH, 3,
      '#3d4250', null
    );

    // --- Rear wheels: oriented straight with the car heading (not steered) ---
    const rearLeftX  = rearCenterX + perpX * halfTrack;
    const rearLeftY  = rearCenterY + perpY * halfTrack;
    const rearRightX = rearCenterX - perpX * halfTrack;
    const rearRightY = rearCenterY - perpY * halfTrack;

    drawRectAt(rearLeftX,  rearLeftY,  car.heading, WHEEL_LENGTH, WHEEL_WIDTH, '#1c1e22', '#000');
    drawRectAt(rearRightX, rearRightY, car.heading, WHEEL_LENGTH, WHEEL_WIDTH, '#1c1e22', '#000');

    // --- Front wheels: oriented with heading + steerAngle, each around its OWN center ---
    const steerRad = car.steerAngle * Math.PI / 180;
    const frontWheelAngle = car.heading + steerRad;

    const frontLeftX  = frontCenterX + perpX * halfTrack;
    const frontLeftY  = frontCenterY + perpY * halfTrack;
    const frontRightX = frontCenterX - perpX * halfTrack;
    const frontRightY = frontCenterY - perpY * halfTrack;

    drawRectAt(frontLeftX,  frontLeftY,  frontWheelAngle, WHEEL_LENGTH, WHEEL_WIDTH, '#ffb454', '#000');
    drawRectAt(frontRightX, frontRightY, frontWheelAngle, WHEEL_LENGTH, WHEEL_WIDTH, '#ffb454', '#000');

    // --- Small heading indicator (front tip) for clarity ---
    ctx.save();
    ctx.fillStyle = '#6fd1ff';
    ctx.beginPath();
    ctx.arc(frontCenterX, frontCenterY, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawWorld() {
    ctx.clearRect(0, 0, W, H);

    // subtle grid for spatial reference
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    const grid = 40;
    for (let gx = 0; gx <= W; gx += grid) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, H);
      ctx.stroke();
    }
    for (let gy = 0; gy <= H; gy += grid) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(W, gy);
      ctx.stroke();
    }
    ctx.restore();

    drawCar();
  }

  function updateHud() {
    document.getElementById('speedVal').textContent = car.speed.toFixed(1);
    document.getElementById('steerVal').textContent = Math.round(car.steerAngle) + '\u00B0';
  }

  // ---------- Main loop ----------
  function frame(timestamp) {
    if (lastTime === null) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    dt = Math.min(dt, 0.05); // clamp to avoid huge jumps on tab-switch
    lastTime = timestamp;

    update(dt);
    drawWorld();
    updateHud();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
