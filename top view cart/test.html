<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top-Down Vehicle</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1b1d22;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  canvas {
    background: #2c2f36;
    border: 2px solid #4a4d55;
    border-radius: 6px;
    display: block;
  }
  canvas.edit-cursor  { cursor: crosshair; }
  canvas.drive-cursor { cursor: default; }

  #bottombar {
    width: 900px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: #9aa0aa;
    min-height: 30px;
    flex-wrap: wrap;
  }

  #modebadge {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 10px;
    border-radius: 4px;
    background: #3a3d45;
    color: #9aa0aa;
    border: 1px solid #5a5e68;
    white-space: nowrap;
  }
  #modebadge.edit { background: #f2cc8f; color: #1b1d22; border-color: #c9a84c; }

  #hud { display: flex; gap: 14px; align-items: center; }
  #hud b { color: #e3e6ea; }

  .key {
    display: inline-block;
    border: 1px solid #5a5e68;
    border-radius: 4px;
    padding: 1px 5px;
    margin: 0 1px;
    background: #3a3d45;
    color: #d6d9de;
    font-size: 11px;
  }

  /* editor bar */
  #editorbar {
    display: none;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  #editorbar.visible { display: flex; }

  #swatches { display: flex; gap: 4px; align-items: center; }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.1s, transform 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }

  #colorPicker {
    width: 20px; height: 20px;
    border: 2px solid transparent;
    padding: 0; background: none;
    cursor: pointer; border-radius: 3px;
  }
  #colorPicker.active { border-color: #fff; }

  #editorhint { font-size: 11px; color: #5a5e68; white-space: nowrap; }

  .exportBtn {
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid #5a5e68;
    background: #3a3d45;
    color: #d6d9de;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .exportBtn:hover { background: #4a4d55; }
  .exportBtn.done  { background: #6a994e; color: #fff; border-color: #6a994e; }
  #exportBtns { display: flex; gap: 5px; margin-left: auto; }

  /* settings row */
  #settings {
    display: flex;
    gap: 14px;
    align-items: center;
    font-size: 12px;
    color: #9aa0aa;
  }
  .sl-group {
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .sl-group label { color: #7a7f8a; }
  .sl-group b { color: #e3e6ea; min-width: 30px; display: inline-block; }
  input[type=range] {
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: #4a4d55;
    border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%; background: #6fd1ff; cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="600" class="drive-cursor"></canvas>

  <div id="bottombar">
    <div id="modebadge">DRIVE</div>

    <div id="hud">
      <div><span class="key">E</span> edit &nbsp; <span class="key">Tab</span> next car</div>
      <div><span class="key">↑</span><span class="key">↓</span> drive &nbsp;<span class="key">←</span><span class="key">→</span> steer</div>
      <div>car: <b id="activeCarVal">1</b></div>
      <div>spd: <b id="speedVal">0.0</b></div>
      <div>str: <b id="steerVal">0°</b></div>
    </div>

    <div id="settings">
      <div class="sl-group">
        <label>cars</label>
        <input type="range" id="sliderCars" min="1" max="12" step="1" value="2">
        <b id="valCars">2</b>
      </div>
      <div class="sl-group">
        <label>scale</label>
        <input type="range" id="sliderScale" min="0.25" max="3" step="0.05" value="0.5">
        <b id="valScale">0.50</b>
      </div>
      <div class="sl-group">
        <label>span</label>
        <input type="range" id="sliderSpan" min="0.3" max="5" step="0.05" value="1">
        <b id="valSpan">1.00</b>
      </div>
    </div>

    <!-- editor-only -->
    <div id="editorbar">
      <div id="swatches"></div>
      <input type="color" id="colorPicker" value="#888888" title="Custom color">
      <div id="editorhint">drag to draw &nbsp;·&nbsp; click a structure to delete it</div>
      <div id="exportBtns">
        <button class="exportBtn" id="exportBtn">Copy JSON</button>
        <button class="exportBtn" id="downloadBtn">Save .json</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ---------- Base vehicle dimensions (at scale 1) ----------
  const BASE_BODY_LENGTH  = 35;   // halved from original 70
  const BASE_TRACK_WIDTH  = 22;   // halved from original 44
  const BASE_WHEEL_LENGTH = 9;    // halved from original 18
  const BASE_WHEEL_WIDTH  = 3.5;  // halved from original 7

  const MAX_STEER_DEG = 38;
  const STEER_RATE    = 110;
  const STEER_RETURN  = 140;
  const MAX_SPEED     = 180;
  const MAX_REVERSE   = -90;
  const ACCEL         = 140;
  const DECEL         = 220;
  const FRICTION      = 90;

  // ---------- Scale state ----------
  let carScale = 0.5;
  let axisSpan = 1.0;
  let numCars  = 2;

  function carDims() {
    return {
      bodyLength  : BASE_BODY_LENGTH  * carScale * axisSpan,
      trackWidth  : BASE_TRACK_WIDTH  * carScale,
      wheelLength : BASE_WHEEL_LENGTH * carScale,
      wheelWidth  : BASE_WHEEL_WIDTH  * carScale,
    };
  }

  // ---------- Car colours (distinct, readable on dark bg) ----------
  const CAR_COLORS = [
    '#6fd1ff', // cyan-blue
    '#ffb454', // amber
    '#a8e063', // lime
    '#ff6b8a', // pink-red
    '#c9b1ff', // lavender
    '#ffd166', // yellow
    '#06d6a0', // teal
    '#ef476f', // hot pink
    '#118ab2', // deep blue
    '#ff9f1c', // orange
    '#b5e48c', // pale green
    '#e9c46a', // gold
  ];

  // ---------- Cars array ----------
  function makeCar(index, total) {
    // Spread cars evenly across the canvas, avoiding dead-centre
    const cols = Math.ceil(Math.sqrt(total));
    const col  = index % cols;
    const row  = Math.floor(index / cols);
    const cellW = W / (cols + 1);
    const cellH = H / (Math.ceil(total / cols) + 1);
    return {
      x: cellW * (col + 1),
      y: cellH * (row + 1),
      heading: -Math.PI / 2,
      speed: 0,
      steerAngle: 0,
      color: CAR_COLORS[index % CAR_COLORS.length],
    };
  }

  let cars = [];
  let activeCar = 0;

  function buildCars(n) {
    const prev = cars[activeCar];
    cars = Array.from({ length: n }, (_, i) => makeCar(i, n));
    // keep active index in range
    activeCar = Math.min(activeCar, n - 1);
    updateHud();
  }

  buildCars(numCars);

  // ---------- Structures ----------
  const STRUCTURES = [
    { x: 180, y: 150, length: 120, width: 55,  color: '#e07a5f' },
    { x: 580, y: 350, length: 80,  width: 100, color: '#3d5a80' },
  ];

  // ---------- Editor state ----------
  const PALETTE = ['#e07a5f','#81b29a','#f2cc8f','#3d5a80','#9b5de5','#f15bb5','#00bbf9','#fee440','#c1121f','#6a994e'];
  let editMode   = false;
  let activeColor = PALETTE[0];
  let dragStart  = null;
  let dragCurrent = null;
  let hoverIdx   = -1;
  const MIN_RECT_SIZE = 8;

  // ---------- Sliders ----------
  const sliderCars  = document.getElementById('sliderCars');
  const sliderScale = document.getElementById('sliderScale');
  const sliderSpan  = document.getElementById('sliderSpan');

  sliderCars.addEventListener('input', () => {
    numCars = parseInt(sliderCars.value);
    document.getElementById('valCars').textContent = numCars;
    buildCars(numCars);
  });
  sliderScale.addEventListener('input', () => {
    carScale = parseFloat(sliderScale.value);
    document.getElementById('valScale').textContent = carScale.toFixed(2);
  });
  sliderSpan.addEventListener('input', () => {
    axisSpan = parseFloat(sliderSpan.value);
    document.getElementById('valSpan').textContent = axisSpan.toFixed(2);
  });

  // ---------- Swatches ----------
  const swatchContainer = document.getElementById('swatches');
  PALETTE.forEach(col => {
    const div = document.createElement('div');
    div.className = 'swatch' + (col === activeColor ? ' active' : '');
    div.style.background = col;
    div.addEventListener('click', () => {
      activeColor = col;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      div.classList.add('active');
      document.getElementById('colorPicker').classList.remove('active');
    });
    swatchContainer.appendChild(div);
  });
  const colorPicker = document.getElementById('colorPicker');
  colorPicker.addEventListener('input', () => {
    activeColor = colorPicker.value;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    colorPicker.classList.add('active');
  });

  // ---------- Export ----------
  function structuresJson() {
    return JSON.stringify(STRUCTURES.map(s => ({
      x: Math.round(s.x), y: Math.round(s.y),
      length: Math.round(s.length), width: Math.round(s.width),
      color: s.color
    })), null, 2);
  }
  document.getElementById('exportBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(structuresJson()).then(() => {
      this.textContent = 'Copied!'; this.classList.add('done');
      setTimeout(() => { this.textContent = 'Copy JSON'; this.classList.remove('done'); }, 1800);
    });
  });
  document.getElementById('downloadBtn').addEventListener('click', function() {
    const blob = new Blob([structuresJson()], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'structures.json'; a.click();
    URL.revokeObjectURL(url);
    this.textContent = 'Saved!'; this.classList.add('done');
    setTimeout(() => { this.textContent = 'Save .json'; this.classList.remove('done'); }, 1800);
  });

  // ---------- Mode toggle ----------
  function setMode(edit) {
    editMode = edit;
    const badge = document.getElementById('modebadge');
    const bar   = document.getElementById('editorbar');
    if (edit) {
      badge.textContent = 'EDIT'; badge.classList.add('edit');
      bar.classList.add('visible');
      canvas.classList.replace('drive-cursor', 'edit-cursor');
      cars.forEach(c => c.speed = 0);
    } else {
      badge.textContent = 'DRIVE'; badge.classList.remove('edit');
      bar.classList.remove('visible');
      canvas.classList.replace('edit-cursor', 'drive-cursor');
      dragStart = null; dragCurrent = null;
    }
  }

  // ---------- Input ----------
  const keys = { up: false, down: false, left: false, right: false };

  window.addEventListener('keydown', e => {
    if (e.key === 'e' || e.key === 'E') { setMode(!editMode); return; }
    if (e.key === 'Tab') {
      e.preventDefault();
      activeCar = (activeCar + 1) % cars.length;
      updateHud();
      return;
    }
    if (editMode) return;
    switch (e.key) {
      case 'ArrowUp':    keys.up    = true; e.preventDefault(); break;
      case 'ArrowDown':  keys.down  = true; e.preventDefault(); break;
      case 'ArrowLeft':  keys.left  = true; e.preventDefault(); break;
      case 'ArrowRight': keys.right = true; e.preventDefault(); break;
    }
  });
  window.addEventListener('keyup', e => {
    if (editMode) return;
    switch (e.key) {
      case 'ArrowUp':    keys.up    = false; e.preventDefault(); break;
      case 'ArrowDown':  keys.down  = false; e.preventDefault(); break;
      case 'ArrowLeft':  keys.left  = false; e.preventDefault(); break;
      case 'ArrowRight': keys.right = false; e.preventDefault(); break;
    }
  });

  // ---------- Canvas mouse (editor) ----------
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function rectFromDrag(a, b) {
    return {
      x: Math.min(a.x, b.x), y: Math.min(a.y, b.y),
      length: Math.abs(b.x - a.x), width: Math.abs(b.y - a.y)
    };
  }
  function hitTest(px, py) {
    for (let i = STRUCTURES.length - 1; i >= 0; i--) {
      const s = STRUCTURES[i];
      if (px >= s.x && px <= s.x + s.length && py >= s.y && py <= s.y + s.width) return i;
    }
    return -1;
  }
  function isOnAnyCar(px, py) {
    const { bodyLength, trackWidth, wheelLength, wheelWidth } = carDims();
    const hL = bodyLength / 2 + wheelLength / 2;
    const hW = trackWidth  / 2 + wheelWidth  / 2;
    const r  = Math.hypot(hL, hW);
    return cars.some(c => {
      const dx = px - c.x, dy = py - c.y;
      return dx * dx + dy * dy < r * r;
    });
  }

  canvas.addEventListener('mousedown', e => {
    if (!editMode) return;
    const p = canvasPos(e);
    const hit = isOnAnyCar(p.x, p.y) ? -1 : hitTest(p.x, p.y);
    dragStart = p; dragCurrent = p;
    dragStart._hitIndex = hit;
  });
  canvas.addEventListener('mousemove', e => {
    if (!editMode) return;
    const p = canvasPos(e);
    hoverIdx = isOnAnyCar(p.x, p.y) ? -1 : hitTest(p.x, p.y);
    if (dragStart) dragCurrent = p;
  });
  canvas.addEventListener('mouseup', e => {
    if (!editMode || !dragStart) return;
    const p = canvasPos(e);
    const r = rectFromDrag(dragStart, p);
    if (r.length < MIN_RECT_SIZE && r.width < MIN_RECT_SIZE) {
      if (dragStart._hitIndex !== -1) STRUCTURES.splice(dragStart._hitIndex, 1);
    } else {
      STRUCTURES.push({ x: r.x, y: r.y, length: r.length, width: r.width, color: activeColor });
    }
    dragStart = null; dragCurrent = null;
  });
  canvas.addEventListener('mouseleave', () => { dragStart = null; dragCurrent = null; });

  // ---------- Collision: OBB vs AABB (SAT) ----------
  function resolveCollisions(car) {
    const { bodyLength, trackWidth, wheelLength, wheelWidth } = carDims();
    const hL   = bodyLength / 2 + wheelLength / 2;
    const hW   = trackWidth  / 2 + wheelWidth  / 2;
    const cosH = Math.cos(car.heading);
    const sinH = Math.sin(car.heading);

    for (const s of STRUCTURES) {
      const scx = s.x + s.length / 2;
      const scy = s.y + s.width  / 2;
      const shL = s.length / 2;
      const shW = s.width  / 2;
      const dx  = car.x - scx;
      const dy  = car.y - scy;

      const axes = [
        { x: cosH,  y: sinH  },
        { x: -sinH, y: cosH  },
        { x: 1,     y: 0     },
        { x: 0,     y: 1     },
      ];

      let minPen = Infinity, pushX = 0, pushY = 0, separated = false;

      for (const ax of axes) {
        const carProj = Math.abs(hL * (ax.x * cosH + ax.y * sinH)) +
                        Math.abs(hW * (ax.x * (-sinH) + ax.y * cosH));
        const strProj = Math.abs(shL * ax.x) + Math.abs(shW * ax.y);
        const dist    = Math.abs(dx * ax.x + dy * ax.y);
        const pen     = carProj + strProj - dist;
        if (pen <= 0) { separated = true; break; }
        if (pen < minPen) {
          minPen = pen;
          const sign = (dx * ax.x + dy * ax.y) >= 0 ? 1 : -1;
          pushX = ax.x * sign; pushY = ax.y * sign;
        }
      }
      if (!separated) {
        car.x += pushX * minPen;
        car.y += pushY * minPen;
        car.speed = 0;
      }
    }
  }

  // ---------- Update ----------
  let lastTime = null;

  function update(dt) {
    if (editMode) return;
    const car = cars[activeCar];
    const { bodyLength } = carDims();

    // Steering
    if (keys.left && !keys.right) {
      car.steerAngle -= STEER_RATE * dt;
    } else if (keys.right && !keys.left) {
      car.steerAngle += STEER_RATE * dt;
    } else {
      if (car.steerAngle > 0) car.steerAngle = Math.max(0, car.steerAngle - STEER_RETURN * dt);
      else if (car.steerAngle < 0) car.steerAngle = Math.min(0, car.steerAngle + STEER_RETURN * dt);
    }
    car.steerAngle = Math.max(-MAX_STEER_DEG, Math.min(MAX_STEER_DEG, car.steerAngle));

    // Throttle
    if (keys.up && !keys.down)       car.speed += ACCEL * dt;
    else if (keys.down && !keys.up)  car.speed -= DECEL * dt;
    else {
      if (car.speed > 0)       car.speed = Math.max(0, car.speed - FRICTION * dt);
      else if (car.speed < 0)  car.speed = Math.min(0, car.speed + FRICTION * dt);
    }
    car.speed = Math.max(MAX_REVERSE, Math.min(MAX_SPEED, car.speed));

    // Bicycle model
    if (Math.abs(car.speed) > 0.01) {
      const steerRad = car.steerAngle * Math.PI / 180;
      const rearX    = car.x - Math.cos(car.heading) * (bodyLength / 2);
      const rearY    = car.y - Math.sin(car.heading) * (bodyLength / 2);
      const newRearX = rearX + Math.cos(car.heading) * car.speed * dt;
      const newRearY = rearY + Math.sin(car.heading) * car.speed * dt;
      car.heading   += (car.speed / bodyLength) * Math.tan(steerRad) * dt;
      car.x = newRearX + Math.cos(car.heading) * (bodyLength / 2);
      car.y = newRearY + Math.sin(car.heading) * (bodyLength / 2);
    }

    // World bounds
    const margin = bodyLength;
    if (car.x < margin)     { car.x = margin;     car.speed = 0; }
    if (car.x > W - margin) { car.x = W - margin; car.speed = 0; }
    if (car.y < margin)     { car.y = margin;      car.speed = 0; }
    if (car.y > H - margin) { car.y = H - margin;  car.speed = 0; }

    resolveCollisions(car);
  }

  // ---------- Drawing ----------
  function drawRectAt(cx, cy, angle, len, wid, fill, stroke) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = fill;
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; }
    ctx.beginPath();
    ctx.rect(-len / 2, -wid / 2, len, wid);
    ctx.fill();
    if (stroke) ctx.stroke();
    ctx.restore();
  }

  function drawOneCar(car, isActive) {
    const { bodyLength, trackWidth, wheelLength, wheelWidth } = carDims();
    const halfBody  = bodyLength / 2;
    const halfTrack = trackWidth / 2;
    const cosH = Math.cos(car.heading);
    const sinH = Math.sin(car.heading);
    const perpX = -sinH, perpY = cosH;

    const frontCX = car.x + cosH * halfBody;
    const frontCY = car.y + sinH * halfBody;
    const rearCX  = car.x - cosH * halfBody;
    const rearCY  = car.y - sinH * halfBody;

    // Active car: subtle white glow halo behind the body
    if (isActive) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = (4 * carScale) + 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(rearCX, rearCY);
      ctx.lineTo(frontCX, frontCY);
      ctx.stroke();
      ctx.restore();
    }

    // Body stem
    ctx.save();
    ctx.strokeStyle = isActive ? car.color : dimColor(car.color, 0.55);
    ctx.lineWidth   = Math.max(1.5, 4 * carScale);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(rearCX, rearCY);
    ctx.lineTo(frontCX, frontCY);
    ctx.stroke();
    ctx.restore();

    // Axle bars
    const axleColor = isActive ? '#5a5e68' : '#3a3d45';
    drawRectAt(rearCX,  rearCY,  car.heading + Math.PI/2, trackWidth, Math.max(1, 3*carScale), axleColor, null);
    drawRectAt(frontCX, frontCY, car.heading + Math.PI/2, trackWidth, Math.max(1, 3*carScale), axleColor, null);

    // Rear wheels
    const rLX = rearCX + perpX * halfTrack, rLY = rearCY + perpY * halfTrack;
    const rRX = rearCX - perpX * halfTrack, rRY = rearCY - perpY * halfTrack;
    const rearWheelColor  = isActive ? '#2a2d35' : '#222428';
    drawRectAt(rLX, rLY, car.heading, wheelLength, wheelWidth, rearWheelColor, '#111');
    drawRectAt(rRX, rRY, car.heading, wheelLength, wheelWidth, rearWheelColor, '#111');

    // Front wheels (steered)
    const steerRad   = car.steerAngle * Math.PI / 180;
    const fWheelAng  = car.heading + steerRad;
    const fLX = frontCX + perpX * halfTrack, fLY = frontCY + perpY * halfTrack;
    const fRX = frontCX - perpX * halfTrack, fRY = frontCY - perpY * halfTrack;
    const frontWheelColor = isActive ? car.color : dimColor(car.color, 0.45);
    drawRectAt(fLX, fLY, fWheelAng, wheelLength, wheelWidth, frontWheelColor, '#111');
    drawRectAt(fRX, fRY, fWheelAng, wheelLength, wheelWidth, frontWheelColor, '#111');

    // Front dot
    ctx.save();
    ctx.fillStyle = isActive ? car.color : dimColor(car.color, 0.45);
    ctx.beginPath();
    ctx.arc(frontCX, frontCY, Math.max(1.5, 3.5 * carScale), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Dim a hex color toward the bg
  function dimColor(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const br = 0x2c, bg = 0x2f, bb = 0x36; // canvas bg color
    return `rgb(${Math.round(r*alpha+br*(1-alpha))},${Math.round(g*alpha+bg*(1-alpha))},${Math.round(b*alpha+bb*(1-alpha))})`;
  }

  function drawStructures() {
    ctx.save();
    for (const s of STRUCTURES) {
      ctx.fillStyle = s.color;
      ctx.fillRect(s.x, s.y, s.length, s.width);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(s.x, s.y, s.length, s.width);
    }
    // In-progress drag preview
    if (editMode && dragStart && dragCurrent) {
      const r = rectFromDrag(dragStart, dragCurrent);
      if (r.length >= MIN_RECT_SIZE || r.width >= MIN_RECT_SIZE) {
        ctx.fillStyle = activeColor;
        ctx.globalAlpha = 0.55;
        ctx.fillRect(r.x, r.y, r.length, r.width);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        ctx.setLineDash([4,3]);
        ctx.strokeRect(r.x, r.y, r.length, r.width);
        ctx.setLineDash([]);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Segoe UI, Arial, sans-serif';
        ctx.fillText(`${Math.round(r.length)} × ${Math.round(r.width)}`, r.x + 4, r.y + 13);
      }
    }
    ctx.restore();
  }

  function drawHover() {
    if (!editMode || dragStart || hoverIdx === -1) return;
    const s = STRUCTURES[hoverIdx];
    ctx.save();
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
    ctx.setLineDash([5,3]); ctx.strokeRect(s.x, s.y, s.length, s.width); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,68,68,0.12)'; ctx.fillRect(s.x, s.y, s.length, s.width);
    ctx.restore();
  }

  function drawWorld() {
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let gx = 0; gx <= W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for (let gy = 0; gy <= H; gy += 40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    ctx.restore();

    drawStructures();
    drawHover();

    // Draw inactive cars first, active on top
    for (let i = 0; i < cars.length; i++) {
      if (i !== activeCar) drawOneCar(cars[i], false);
    }
    drawOneCar(cars[activeCar], true);

    // Edit overlay tint
    if (editMode) {
      ctx.save();
      ctx.fillStyle = 'rgba(242,204,143,0.08)';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  function updateHud() {
    const car = cars[activeCar];
    document.getElementById('activeCarVal').textContent = activeCar + 1;
    document.getElementById('speedVal').textContent = car ? car.speed.toFixed(1) : '0.0';
    document.getElementById('steerVal').textContent = car ? Math.round(car.steerAngle) + '°' : '0°';
  }

  function frame(ts) {
    if (lastTime === null) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    update(dt);
    drawWorld();
    updateHud();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
