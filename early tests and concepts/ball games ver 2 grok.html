<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Simple Dodge Game</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #0a0a1f;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
  #ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #88ff88;
    font-size: 22px;
    pointer-events: none;
    text-shadow: 0 0 6px #000;
  }
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>
<canvas id="c"></canvas>

<script>
// =============================================================

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");

let W, H;
let player = {};

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Conservative right-side position – should be visible on almost any screen
  player.x = W - 220;          // ← fixed distance from right edge
  player.y = H / 2 - 25;

  console.log(`Canvas resized → W=${W}, H=${H}, player at (${player.x}, ${player.y})`);
}
window.addEventListener("resize", resize);
resize();

// Constants
const PLAYER_SIZE = 60;          // slightly bigger for visibility
const SPEED_BLOCKS = 4.2;
const SPEED_BALLS  = 9.5;
const FREQ_BLOCKS = 1300;
const FREQ_BALLS  = 2100;

// Player
player.w = PLAYER_SIZE;
player.h = PLAYER_SIZE;
player.speed = 9;

// Entities + state
let blocks = [];
let balls  = [];
let score = 0;
let flashRed = 0;
let keys = {};
let gameStarted = false;

function startGame() {
  gameStarted = true;
  spawnBlock(); spawnBlock(); spawnBall();
  console.log("Game started – spawning initial objects");
}

function spawnBlock() {
  const size = 35 + Math.random() * 55;
  blocks.push({
    x: -size - 40,
    y: 60 + Math.random() * (H - 120 - size),
    w: size, h: size * (0.6 + Math.random() * 0.8),
    vx: SPEED_BLOCKS + Math.random() * 1.2
  });
}

function spawnBall() {
  const r = 12 + Math.random() * 10;
  balls.push({
    x: -60,
    y: 60 + Math.random() * (H - 120),
    r,
    vx: SPEED_BALLS + Math.random() * 2.5
  });
}

// ────────────────────────────────────────────────
function update(dt) {
  if (!gameStarted) return;

  if (keys["ArrowUp"]   || keys["KeyW"]) player.y -= player.speed;
  if (keys["ArrowDown"] || keys["KeyS"]) player.y += player.speed;
  player.y = Math.max(40, Math.min(H - PLAYER_SIZE - 40, player.y));

  // blocks
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    b.x += b.vx;
    if (b.x + b.w > player.x && b.x < player.x + player.w &&
        b.y + b.h > player.y && b.y < player.y + player.h) {
      flashRed = 16;
      blocks.splice(i, 1);
      continue;
    }
    if (b.x > W + 100) { blocks.splice(i, 1); score += 10; }
  }

  // balls – bounce
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.x += b.vx;

    const dx = (b.x + b.r) - (player.x + player.w/2);
    const dy = (b.y + b.r) - (player.y + player.h/2);
    if (Math.hypot(dx, dy) < b.r + player.w * 0.6) {
      b.vx = -b.vx * 1.03;
      b.y += -dy * 0.4;
      b.x += -dx * 0.5;
      continue;
    }

    if (b.x > W + 100) { balls.splice(i, 1); score += 25; }
    if (b.x < -100)    { balls.splice(i, 1); score += 60; }
  }

  scoreElement.textContent = score;
}

// ────────────────────────────────────────────────
function draw() {
  // bg + flash
  ctx.fillStyle = flashRed > 0 ? "#500" : "#111133";
  ctx.fillRect(0, 0, W, H);
  if (flashRed > 0) flashRed--;

  if (!gameStarted) {
    ctx.fillStyle = "white";
    ctx.font = "bold 70px Arial";
    ctx.textAlign = "center";
    ctx.fillText("PRESS ARROW KEY", W/2, H/2);
    return;
  }

  // blocks
  ctx.fillStyle = "#e33";
  for (const b of blocks) ctx.fillRect(b.x, b.y, b.w, b.h);

  // balls
  ctx.fillStyle = "#ff3";
  ctx.shadowColor = "#fa3"; ctx.shadowBlur = 12;
  for (const b of balls) {
    ctx.beginPath();
    ctx.arc(b.x + b.r, b.y + b.r, b.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // PLAYER – drawn LAST, extremely visible
  ctx.fillStyle = "#0f8";               // bright neon green
  ctx.shadowColor   = "#0f8";
  ctx.shadowBlur    = 30;
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.shadowBlur = 0;

  // thick white border
  ctx.strokeStyle = "white";
  ctx.lineWidth = 10;
  ctx.strokeRect(player.x - 5, player.y - 5, player.w + 10, player.h + 10);

  // debug text on canvas
  ctx.fillStyle = "white";
  ctx.font = "24px monospace";
  ctx.textAlign = "left";
  ctx.fillText(`Player: x=${Math.round(player.x)}  y=${Math.round(player.y)}`, 20, 40);
}

// ────────────────────────────────────────────────
let last = 0;
let blockTimer = FREQ_BLOCKS - 300;
let ballTimer  = FREQ_BALLS  - 600;

function loop(ts) {
  if (!last) last = ts;
  const dt = ts - last; last = ts;

  if (gameStarted) {
    blockTimer += dt; ballTimer += dt;
    if (blockTimer >= FREQ_BLOCKS) { spawnBlock(); blockTimer -= FREQ_BLOCKS; }
    if (ballTimer >= FREQ_BALLS)   { spawnBall();  ballTimer -= FREQ_BALLS;   }
  }

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Controls
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (!gameStarted && ["ArrowUp","ArrowDown","KeyW","KeyS"].includes(e.code)) {
    startGame();
  }
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

requestAnimationFrame(loop);
</script>
</body>
</html>
