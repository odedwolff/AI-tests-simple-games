<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PADDLE·VERSE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111210;
    --panel-bg: #161815;
    --panel-border: #2a2d26;
    --green: #7ec850;
    --green-dim: #4a7a2e;
    --yellow: #d4a929;
    --orange: #c96a1e;
    --text: #a8b09a;
    --text-bright: #d0d8c8;
    --text-dim: #555f48;
    --active: #7ec850;
    --inactive: #334428;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  #root {
    display: flex;
    width: 100vw;
    height: 100vh;
    align-items: stretch;
  }

  /* PANELS */
  .side-panel {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 12px 10px;
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    overflow-y: auto;
    gap: 10px;
  }

  #left-panel { border-right: 1px solid var(--panel-border); }
  #right-panel { border-left: 1px solid var(--panel-border); align-items: center; }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--green-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 6px;
    margin-bottom: 4px;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .ctrl-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .ctrl-value {
    font-size: 11px;
    color: var(--yellow);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--panel-border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
  }

  input[type=number] {
    background: #1a1d17;
    border: 1px solid var(--panel-border);
    color: var(--yellow);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 5px;
    width: 100%;
    outline: none;
  }
  input[type=number]:focus { border-color: var(--green-dim); }

  .divider {
    border: none;
    border-top: 1px solid var(--panel-border);
    margin: 2px 0;
  }

  /* GAME CANVAS WRAPPER */
  #game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #game-canvas {
    display: block;
    background: #0d0f0c;
    border: 1px solid var(--panel-border);
    image-rendering: pixelated;
  }

  /* RIGHT PANEL BUTTONS */
  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 8px;
    width: 100%;
    border: 1px solid;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
    background: transparent;
  }

  .btn-green {
    color: var(--green);
    border-color: var(--green-dim);
  }
  .btn-green:hover { background: #1d2918; }

  .btn-orange {
    color: var(--orange);
    border-color: #6b3810;
  }
  .btn-orange:hover { background: #1e1610; }

  .btn-yellow {
    color: var(--yellow);
    border-color: #6b5510;
  }
  .btn-yellow:hover { background: #1c1a10; }

  /* STATUS INDICATORS */
  .status-block {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .status-val {
    font-size: 10px;
    color: var(--text-bright);
  }

  .indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .ind-on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .ind-off { background: #2a2d26; }

  .active-badge {
    font-size: 8px;
    padding: 2px 5px;
    border: 1px solid;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  .badge-1 { color: var(--green); border-color: var(--green-dim); }
  .badge-2 { color: var(--orange); border-color: #6b3810; }

  #countdown-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: 80px;
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 40px var(--green);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .key-hint {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-align: center;
    margin-top: 2px;
  }

  .key-box {
    display: inline-block;
    padding: 1px 4px;
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 8px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="root">
  <!-- LEFT PANEL: DEV CONTROLS -->
  <div class="side-panel" id="left-panel">
    <div class="panel-title">Dev Console</div>

    <div class="ctrl-group">
      <div class="ctrl-row">
        <span class="ctrl-label">G (gravity)</span>
        <span class="ctrl-value" id="lbl-G">123</span>
        <input type="range" id="sl-G" min="0" max="600" step="1" value="123" tabindex="-1">
        <input type="number" id="in-G" value="123" tabindex="1">
      </div>

      <hr class="divider">

      <div class="ctrl-row">
        <span class="ctrl-label">Init Speed</span>
        <span class="ctrl-value" id="lbl-IS">400</span>
        <input type="range" id="sl-IS" min="50" max="1200" step="10" value="400" tabindex="-1">
        <input type="number" id="in-IS" value="400" tabindex="2">
      </div>

      <hr class="divider">

      <div class="ctrl-row">
        <span class="ctrl-label">Init Angle (°)</span>
        <span class="ctrl-value" id="lbl-IA">49</span>
        <input type="range" id="sl-IA" min="1" max="89" step="1" value="49" tabindex="-1">
        <input type="number" id="in-IA" value="49" tabindex="3">
      </div>

      <hr class="divider">

      <div class="ctrl-row">
        <span class="ctrl-label">Ball Radius (dp)</span>
        <span class="ctrl-value" id="lbl-BR">5</span>
        <input type="range" id="sl-BR" min="2" max="30" step="1" value="5" tabindex="-1">
        <input type="number" id="in-BR" value="5" tabindex="4">
      </div>
    </div>

    <hr class="divider">

    <div class="panel-title" style="margin-top:4px">Active Paddle</div>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="active-badge badge-1" id="badge-p1">P1</span>
      <span class="active-badge badge-2" id="badge-p2">P2</span>
    </div>
    <div class="key-hint"><span class="key-box">TAB</span> to switch</div>

    <hr class="divider">
    <div class="panel-title">Controls</div>
    <div class="key-hint">
      <span class="key-box">↑↓←→</span> Move<br><br>
      <span class="key-box">Q</span> Rotate CCW &nbsp;
      <span class="key-box">W</span> Rotate CW
    </div>
  </div>

  <!-- GAME CANVAS -->
  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="countdown-overlay">3</div>
  </div>

  <!-- RIGHT PANEL: CONTROLS -->
  <div class="side-panel" id="right-panel">
    <div class="panel-title">Controls</div>

    <button class="btn btn-green" id="btn-restart">↺ Restart</button>
    <button class="btn btn-yellow" id="btn-pause">⏸ Pause</button>

    <hr class="divider" style="width:100%">

    <div class="panel-title">Status</div>
    <div class="status-block">
      <div class="status-row">
        <span>STATE</span>
        <span class="status-val" id="st-state">RUNNING</span>
      </div>
      <div class="status-row">
        <span>RESETS</span>
        <span class="status-val" id="st-resets">0</span>
      </div>
      <div class="status-row">
        <span>BALL VX</span>
        <span class="status-val" id="st-vx">0</span>
      </div>
      <div class="status-row">
        <span>BALL VY</span>
        <span class="status-val" id="st-vy">0</span>
      </div>
      <div class="status-row">
        <span>BALL SPD</span>
        <span class="status-val" id="st-spd">0</span>
      </div>
    </div>

    <hr class="divider" style="width:100%">

    <div class="panel-title">Physics</div>
    <div class="status-block">
      <div class="status-row">
        <span>GRAVITY</span>
        <span class="status-val" id="st-g">123</span>
      </div>
    </div>
  </div>
</div>

<div id="countdown-overlay"></div>

<script>
// ─── CONSTANTS & STATE ───────────────────────────────────────────────────────

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// D-pixel: 1/1000 of screen width
let DPX; // pixels per d-pixel

// Game params (mutable via dev panel)
let G_DP       = 123;   // gravity in dp/s²
let INIT_SPEED = 400;   // dp/s
let INIT_ANGLE = 49;    // degrees from horizontal
let BALL_RAD   = 5;     // dp

// Fixed game object sizes
const AVT_WIDTH = 75;   // dp (long side)
const AVT_THICK = 10;   // dp (short side)
const PADDLE_MOVE_SPEED = 250; // dp/s
const PADDLE_ROT_SPEED  = 160; // deg/s

// World margins in dp
const MARGIN_SIDE = 150;
const MARGIN_TB   = 10;

// Game state
let ball, paddles, activePlayer, paused, gameState, resets;
let countdown = 0;
let countdownTimer = null;

// Input state
const keys = {};

// ─── SIZING ─────────────────────────────────────────────────────────────────

function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  // Side panel widths (in real pixels) - computed from d-pixel margins
  // The game panel takes whatever is left
  const leftPanel  = document.getElementById('left-panel');
  const rightPanel = document.getElementById('right-panel');

  // We need DPX first to compute panel sizes in pixels
  // DPX = total screen width / 1000
  DPX = W / 1000;

  const marginSidePx = MARGIN_SIDE * DPX;
  const marginTBPx   = MARGIN_TB   * DPX;

  leftPanel.style.width  = marginSidePx + 'px';
  rightPanel.style.width = marginSidePx + 'px';

  const canvasW = W - 2 * marginSidePx;
  const canvasH = H - 2 * marginTBPx;

  canvas.width  = Math.floor(canvasW);
  canvas.height = Math.floor(canvasH);
  canvas.style.marginTop    = marginTBPx + 'px';
  canvas.style.marginBottom = marginTBPx + 'px';
}

// ─── COORDINATE HELPERS ─────────────────────────────────────────────────────

// Convert dp to canvas pixels
function dp(v) { return v * DPX; }

// Game world size in dp (canvas size)
function worldW() { return canvas.width  / DPX; }
function worldH() { return canvas.height / DPX; }

// ─── GAME OBJECTS ───────────────────────────────────────────────────────────

function makePaddle(x, y, angle, id) {
  return { x, y, angle, id, vx: 0, vy: 0 };
}

function makeBall() {
  const rad = INIT_ANGLE * Math.PI / 180;
  return {
    x:  2 + BALL_RAD,
    y:  worldH() - 2 - BALL_RAD,
    vx: INIT_SPEED * Math.cos(rad),
    vy: -INIT_SPEED * Math.sin(rad),
  };
}

function initGame() {
  const ww = worldW(), wh = worldH();
  ball = makeBall();

  // Paddle 1: left side, vertical orientation (angle=90°), vertically centered
  // Paddle 2: right side, vertical orientation, vertically centered
  paddles = [
    makePaddle(AVT_THICK / 2 + 4, wh / 2, 90, 1),
    makePaddle(ww - AVT_THICK / 2 - 4, wh / 2, 90, 2),
  ];

  if (activePlayer === undefined) activePlayer = 0;
  gameState = 'running';
  paused = false;
  if (resets === undefined) resets = 0;
  updateUI();
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────────

function updatePhysics(dt) {
  if (paused || gameState !== 'running') return;

  // Gravity
  ball.vy += G_DP * dt;

  // Ball movement
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Paddle collision
  for (const pad of paddles) {
    collideBallPaddle(ball, pad);
  }

  // Out of bounds
  if (
    ball.x + BALL_RAD < 0 ||
    ball.x - BALL_RAD > worldW() ||
    ball.y + BALL_RAD < 0 ||
    ball.y - BALL_RAD > worldH()
  ) {
    triggerCountdown();
  }
}

function collideBallPaddle(b, pad) {
  // Transform ball to paddle local space
  const angleRad = pad.angle * Math.PI / 180;
  const cos = Math.cos(-angleRad);
  const sin = Math.sin(-angleRad);

  const dx = b.x - pad.x;
  const dy = b.y - pad.y;

  // Local coords
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;

  // Paddle extents in local space
  const hw = AVT_WIDTH / 2;
  const ht = AVT_THICK / 2;
  const r  = BALL_RAD;

  // Check AABB overlap with ball radius margin
  if (lx < -(hw + r) || lx > (hw + r)) return;
  if (ly < -(ht + r) || ly > (ht + r)) return;

  // Closest point on paddle rect to ball center
  const cx = Math.max(-hw, Math.min(hw, lx));
  const cy = Math.max(-ht, Math.min(ht, ly));

  const distX = lx - cx;
  const distY = ly - cy;
  const dist  = Math.sqrt(distX * distX + distY * distY);

  if (dist > r) return; // no collision

  // Collision normal in local space
  let nx, ny;
  if (dist === 0) {
    // Ball center inside paddle – push out on shortest axis
    const overlapX = hw + r - Math.abs(lx);
    const overlapY = ht + r - Math.abs(ly);
    if (overlapX < overlapY) {
      nx = lx < 0 ? -1 : 1; ny = 0;
    } else {
      nx = 0; ny = ly < 0 ? -1 : 1;
    }
  } else {
    nx = distX / dist;
    ny = distY / dist;
  }

  // Push ball out
  const penetration = r - dist;
  const posFixLX = lx + nx * penetration;
  const posFixLY = ly + ny * penetration;

  // Transform back to world
  const cosF = Math.cos(angleRad);
  const sinF = Math.sin(angleRad);
  b.x = pad.x + posFixLX * cosF - posFixLY * sinF;
  b.y = pad.y + posFixLX * sinF + posFixLY * cosF;

  // Reflect velocity in local space
  const lvx = b.vx * cos - b.vy * sin;
  const lvy = b.vx * sin + b.vy * cos;

  const dot = lvx * nx + lvy * ny;
  const rlvx = lvx - 2 * dot * nx;
  const rlvy = lvy - 2 * dot * ny;

  // Transform velocity back to world
  b.vx = rlvx * cosF - rlvy * sinF;
  b.vy = rlvx * sinF + rlvy * cosF;
}

function updatePaddles(dt) {
  if (paused || gameState !== 'running') return;

  const pad = paddles[activePlayer];
  const spd = PADDLE_MOVE_SPEED;

  if (keys['ArrowLeft'])  pad.x -= spd * dt;
  if (keys['ArrowRight']) pad.x += spd * dt;
  if (keys['ArrowUp'])    pad.y -= spd * dt;
  if (keys['ArrowDown'])  pad.y += spd * dt;

  if (keys['q'] || keys['Q']) pad.angle -= PADDLE_ROT_SPEED * dt;
  if (keys['w'] || keys['W']) pad.angle += PADDLE_ROT_SPEED * dt;

  // Clamp paddle to world bounds (center point)
  const ww = worldW(), wh = worldH();
  pad.x = Math.max(AVT_THICK/2, Math.min(ww - AVT_THICK/2, pad.x));
  pad.y = Math.max(AVT_THICK/2, Math.min(wh - AVT_THICK/2, pad.y));
}

// ─── COUNTDOWN / RESET ───────────────────────────────────────────────────────

function triggerCountdown() {
  if (gameState === 'countdown') return;
  gameState = 'countdown';
  resets++;

  let count = 3;
  const overlay = document.getElementById('countdown-overlay');
  overlay.textContent = count;
  overlay.style.opacity = '1';

  const tick = () => {
    count--;
    if (count <= 0) {
      overlay.style.opacity = '0';
      initGame();
      gameState = 'running';
    } else {
      overlay.textContent = count;
      setTimeout(tick, 800);
    }
  };
  setTimeout(tick, 800);
}

// ─── DRAWING ─────────────────────────────────────────────────────────────────

const COLOR_BG     = '#0d0f0c';
const COLOR_GRID   = '#151815';
const COLOR_BALL   = '#d4a929';
const COLOR_BALL_GLOW = 'rgba(212,169,41,0.18)';

const PADDLE_COLORS = [
  // P1
  { faceA: '#3d7a1e', faceB: '#a0c060', edge: '#2a5514', active: '#7ec850' },
  // P2
  { faceA: '#7a3d10', faceB: '#d08040', edge: '#55280a', active: '#c96a1e' },
];

function drawGrid() {
  const step = dp(50);
  ctx.strokeStyle = COLOR_GRID;
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function drawBall() {
  const bx = dp(ball.x), by = dp(ball.y), br = dp(BALL_RAD);

  // Glow
  const grd = ctx.createRadialGradient(bx, by, 0, bx, by, br * 3);
  grd.addColorStop(0, 'rgba(212,169,41,0.25)');
  grd.addColorStop(1, 'rgba(212,169,41,0)');
  ctx.beginPath();
  ctx.arc(bx, by, br * 3, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Ball
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  const bGrd = ctx.createRadialGradient(bx - br * 0.3, by - br * 0.3, 0, bx, by, br);
  bGrd.addColorStop(0, '#f0d060');
  bGrd.addColorStop(1, '#a07010');
  ctx.fillStyle = bGrd;
  ctx.fill();
  ctx.strokeStyle = '#806010';
  ctx.lineWidth = dp(0.8);
  ctx.stroke();
}

function drawPaddle(pad, isActive) {
  const cx = dp(pad.x), cy = dp(pad.y);
  const hw = dp(AVT_WIDTH / 2), ht = dp(AVT_THICK / 2);
  const col = PADDLE_COLORS[pad.id - 1];
  const angleRad = pad.angle * Math.PI / 180;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleRad);

  // Glow for active paddle
  if (isActive) {
    ctx.shadowColor = col.active;
    ctx.shadowBlur  = dp(8);
  }

  // Top face (faceA - darker)
  ctx.fillStyle = col.faceA;
  ctx.fillRect(-hw, -ht, hw * 2, ht);

  // Bottom face (faceB - lighter)
  ctx.fillStyle = col.faceB;
  ctx.fillRect(-hw, 0, hw * 2, ht);

  // Center line divider
  ctx.strokeStyle = col.edge;
  ctx.lineWidth = dp(0.8);
  ctx.beginPath();
  ctx.moveTo(-hw, 0); ctx.lineTo(hw, 0);
  ctx.stroke();

  // Outline
  ctx.strokeStyle = isActive ? col.active : col.edge;
  ctx.lineWidth = isActive ? dp(1.5) : dp(0.8);
  ctx.strokeRect(-hw, -ht, hw * 2, ht * 2);

  // Tick marks on long edges
  ctx.strokeStyle = isActive ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
  ctx.lineWidth = dp(0.5);
  for (let i = -2; i <= 2; i++) {
    const tx = i * (hw / 2.5);
    ctx.beginPath(); ctx.moveTo(tx, -ht); ctx.lineTo(tx, -ht + dp(2)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx,  ht); ctx.lineTo(tx,  ht - dp(2)); ctx.stroke();
  }

  // Player label
  ctx.shadowBlur = 0;
  ctx.font = `${dp(7)}px Orbitron, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = isActive ? '#fff' : 'rgba(255,255,255,0.35)';
  ctx.fillText(`P${pad.id}`, 0, 0);

  ctx.restore();
}

function drawPausedOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = `${dp(20)}px Orbitron, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#7ec850';
  ctx.shadowColor = '#7ec850';
  ctx.shadowBlur = dp(10);
  ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = COLOR_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();

  // Border
  ctx.strokeStyle = '#2a2d26';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);

  drawBall();

  for (let i = 0; i < paddles.length; i++) {
    drawPaddle(paddles[i], i === activePlayer);
  }

  if (paused) drawPausedOverlay();
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────

let lastTime = null;

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  updatePaddles(dt);
  updatePhysics(dt);
  draw();
  updateStatusPanel();

  requestAnimationFrame(loop);
}

// ─── UI / CONTROLS ───────────────────────────────────────────────────────────

function updateUI() {
  // Active player badges
  document.getElementById('badge-p1').style.opacity = activePlayer === 0 ? '1' : '0.3';
  document.getElementById('badge-p2').style.opacity = activePlayer === 1 ? '1' : '0.3';
}

function updateStatusPanel() {
  document.getElementById('st-state').textContent  = paused ? 'PAUSED' : gameState.toUpperCase();
  document.getElementById('st-resets').textContent = resets;
  if (ball) {
    document.getElementById('st-vx').textContent  = ball.vx.toFixed(0);
    document.getElementById('st-vy').textContent  = ball.vy.toFixed(0);
    const spd = Math.sqrt(ball.vx ** 2 + ball.vy ** 2);
    document.getElementById('st-spd').textContent = spd.toFixed(0);
  }
  document.getElementById('st-g').textContent = G_DP;
}

// Dev panel controls helper
function bindDevControl(slId, inId, lblId, getter, setter, min, max) {
  const sl  = document.getElementById(slId);
  const inp = document.getElementById(inId);
  const lbl = document.getElementById(lblId);

  const apply = (v) => {
    v = Math.max(min, Math.min(max, parseFloat(v) || 0));
    setter(v);
    sl.value  = v;
    inp.value = v;
    lbl.textContent = v;
  };

  sl.addEventListener('input', () => apply(sl.value));
  sl.addEventListener('change', () => { apply(sl.value); sl.blur(); });

  inp.addEventListener('change', () => { apply(inp.value); inp.blur(); });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { apply(inp.value); inp.blur(); e.stopPropagation(); }
  });
  // prevent arrow keys in number input from affecting game
  inp.addEventListener('keydown', (e) => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.stopPropagation();
    }
  });
}

// Buttons
document.getElementById('btn-restart').addEventListener('click', () => {
  resets = 0;
  initGame();
  document.getElementById('countdown-overlay').style.opacity = '0';
});

document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ Resume' : '⏸ Pause';
});

// ─── KEY HANDLING ────────────────────────────────────────────────────────────

window.addEventListener('keydown', (e) => {
  // Don't capture keys when focus is on input elements
  if (e.target.tagName === 'INPUT') return;

  keys[e.key] = true;

  if (e.key === 'Tab') {
    e.preventDefault();
    activePlayer = 1 - activePlayer;
    updateUI();
  }

  if (e.key === ' ') {
    paused = !paused;
    document.getElementById('btn-pause').textContent = paused ? '▶ Resume' : '⏸ Pause';
  }

  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// ─── INIT ────────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  resize();
  initGame();
});

// Bind dev panel
bindDevControl('sl-G',  'in-G',  'lbl-G',  () => G_DP,       (v) => { G_DP = v; }, 0, 600);
bindDevControl('sl-IS', 'in-IS', 'lbl-IS', () => INIT_SPEED,  (v) => { INIT_SPEED = v; }, 50, 1200);
bindDevControl('sl-IA', 'in-IA', 'lbl-IA', () => INIT_ANGLE,  (v) => { INIT_ANGLE = v; }, 1, 89);
bindDevControl('sl-BR', 'in-BR', 'lbl-BR', () => BALL_RAD,    (v) => { BALL_RAD = v; },   2, 30);

resize();
resets = 0;
activePlayer = 0;
initGame();
requestAnimationFrame(loop);
</script>
