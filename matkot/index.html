<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Ball</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #c8c8c8;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #root {
    display: flex;
    width: 100vw;
    height: 100vh;
    align-items: stretch;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 150px;
    min-width: 150px;
    background: #111;
    border-right: 1px solid #2a2a2a;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }

  #left-panel h2 {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #4a9;
    text-transform: uppercase;
    border-bottom: 1px solid #2a3a2a;
    padding-bottom: 6px;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 8px; }

  .ctrl-item { display: flex; flex-direction: column; gap: 3px; }

  .ctrl-label {
    font-size: 8px;
    color: #7a7;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .ctrl-val {
    font-size: 11px;
    color: #bf9;
    font-family: 'Share Tech Mono', monospace;
  }

  .ctrl-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: #2a3a2a;
    outline: none;
    border-radius: 2px;
  }

  .ctrl-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4a9;
    cursor: pointer;
  }

  /* GAME CENTER */
  #game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
    position: relative;
  }

  #game-canvas {
    display: block;
    border: 1px solid #2d3d2d;
    background: #181f18;
    image-rendering: crisp-edges;
  }

  /* RIGHT PANEL */
  #right-panel {
    width: 150px;
    min-width: 150px;
    background: #111;
    border-left: 1px solid #2a2a2a;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }

  #right-panel h2 {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #c84;
    text-transform: uppercase;
    border-bottom: 1px solid #3a2a1a;
    padding-bottom: 6px;
  }

  .btn {
    width: 100%;
    padding: 8px 0;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .btn-green {
    color: #4a9;
    border-color: #2a5a3a;
  }
  .btn-green:hover { background: #1a3a2a; color: #6cf; }

  .btn-orange {
    color: #c84;
    border-color: #5a3a1a;
  }
  .btn-orange:hover { background: #3a2a1a; color: #fb6; }

  .btn-yellow {
    color: #ba6;
    border-color: #4a3a1a;
  }
  .btn-yellow:hover { background: #2a2a1a; color: #ed8; }

  .status-box {
    background: #151515;
    border: 1px solid #2a2a2a;
    padding: 8px;
    font-size: 9px;
    color: #666;
    line-height: 1.7;
  }

  .status-box .s-label { color: #555; }
  .status-box .s-val { color: #8b8; float: right; }

  .key-hint {
    font-size: 8px;
    color: #444;
    line-height: 1.8;
    border-top: 1px solid #222;
    padding-top: 10px;
  }

  .key-hint span {
    color: #6a8;
    font-family: 'Orbitron', monospace;
    font-size: 7px;
  }

  #countdown-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    color: #fb6;
    text-shadow: 0 0 30px #c84, 0 0 60px #c8440a;
    pointer-events: none;
    display: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="root">

  <!-- LEFT: DEV PANEL -->
  <div id="left-panel">
    <h2>Dev Panel</h2>
    <div class="ctrl-group">

      <div class="ctrl-item">
        <div class="ctrl-label">Gravity G</div>
        <div class="ctrl-val" id="val-g">46</div>
        <input type="range" class="ctrl-slider" id="sl-g" min="0" max="200" step="1" value="46">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-label">Init Speed</div>
        <div class="ctrl-val" id="val-spd">220</div>
        <input type="range" class="ctrl-slider" id="sl-spd" min="50" max="600" step="5" value="220">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-label">Ball Angle °</div>
        <div class="ctrl-val" id="val-ang">37</div>
        <input type="range" class="ctrl-slider" id="sl-ang" min="1" max="89" step="1" value="37">
      </div>

    </div>

    <div class="key-hint">
      <div><span>ARROWS</span> move paddle</div>
      <div><span>Q / W</span> rotate</div>
      <div><span>TAB</span> switch player</div>
      <div><span>P</span> pause</div>
      <div><span>R</span> restart</div>
    </div>
  </div>

  <!-- CENTER: GAME -->
  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="countdown-overlay"></div>
  </div>

  <!-- RIGHT: CONTROLS -->
  <div id="right-panel">
    <h2>Controls</h2>
    <button class="btn btn-green" id="btn-pause">⏸ PAUSE</button>
    <button class="btn btn-orange" id="btn-restart">↺ RESTART</button>
    <button class="btn btn-yellow" id="btn-reset-dev">⚙ RESET DEV</button>

    <div class="status-box">
      <div><span class="s-label">Active</span><span class="s-val" id="st-active">P1</span></div>
      <div><span class="s-label">Ball Vx</span><span class="s-val" id="st-vx">—</span></div>
      <div><span class="s-label">Ball Vy</span><span class="s-val" id="st-vy">—</span></div>
      <div><span class="s-label">Resets</span><span class="s-val" id="st-resets">0</span></div>
    </div>
  </div>

</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const D = (dp, W) => dp * W / 1000;  // d-pixel to actual px

let G_BASE = 46;
let INIT_SPEED_BASE = 220;
let INIT_ANGLE_BASE = 37;

const AVT_WIDTH_DP  = 75;
const AVT_THICK_DP  = 10;
const BALL_RAD_DP   = 5;
const MARGIN_SIDE_DP = 150;
const MARGIN_TB_DP   = 10;
const MOVE_SPEED_DP  = 180; // d-px/s paddle move speed
const ROT_SPEED      = 1.8; // rad/s

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('game-wrap');

let W, H;  // game canvas pixel size (full screen width reference for d-pixels)
let GW, GH; // game world (inner) size

function resize() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  // Canvas fills the center area (between panels, with top/bottom margin)
  const cw = ww - 300; // 150 each side panels
  const ch = wh;
  canvas.width  = cw;
  canvas.height = ch;
  W  = ww;   // reference width for d-pixels = full screen
  GW = cw;
  GH = ch - 2 * D(MARGIN_TB_DP, W);
}
resize();

// ─── STATE ────────────────────────────────────────────────────────────────────
let paused = false;
let counting = false;
let countVal = 3;
let resetCount = 0;
let activePlayer = 0; // 0 or 1

let ball, paddles;
let keys = {};

function dp(v) { return v * W / 1000; }

function initState() {
  // Ball starts at bottom-left corner, shot at INIT_ANGLE upward
  const ang = INIT_ANGLE_BASE * Math.PI / 180;
  const spd = dp(INIT_SPEED_BASE);
  ball = {
    x: dp(BALL_RAD_DP) + dp(5),
    y: GH - dp(BALL_RAD_DP) - dp(5),
    vx: spd * Math.cos(ang),
    vy: -spd * Math.sin(ang),
    r: dp(BALL_RAD_DP)
  };

  const pw = dp(AVT_WIDTH_DP);
  const pt = dp(AVT_THICK_DP);

  // Paddles: vertical orientation → rotated 90°, placed near left/right sides
  paddles = [
    {
      x: dp(30),
      y: GH / 2,
      angle: 0,      // 0 = "vertical" (tall)
      w: pt,         // visual width (thickness direction)
      h: pw,         // visual height (length direction)
      color1: '#3a7a4a',
      color2: '#1a4a2a',
      highlight1: '#5afa7a',
      highlight2: '#2ada4a'
    },
    {
      x: GW - dp(30),
      y: GH / 2,
      angle: 0,
      w: pt,
      h: pw,
      color1: '#7a6a2a',
      color2: '#4a4a1a',
      highlight1: '#fada5a',
      highlight2: '#daa02a'
    }
  ];
}

initState();

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Tab') { e.preventDefault(); activePlayer = 1 - activePlayer; return; }
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (e.key === 'r' || e.key === 'R') { triggerReset(); return; }
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-restart').addEventListener('click', triggerReset);
document.getElementById('btn-reset-dev').addEventListener('click', () => {
  document.getElementById('sl-g').value   = 46;
  document.getElementById('sl-spd').value = 220;
  document.getElementById('sl-ang').value = 37;
  G_BASE = 46; INIT_SPEED_BASE = 220; INIT_ANGLE_BASE = 37;
  updateDevLabels();
  triggerReset();
});

// Sliders
function updateDevLabels() {
  document.getElementById('val-g').textContent   = G_BASE;
  document.getElementById('val-spd').textContent = INIT_SPEED_BASE;
  document.getElementById('val-ang').textContent = INIT_ANGLE_BASE;
}
document.getElementById('sl-g').addEventListener('input', e => {
  G_BASE = +e.target.value; updateDevLabels();
});
document.getElementById('sl-spd').addEventListener('input', e => {
  INIT_SPEED_BASE = +e.target.value; updateDevLabels();
});
document.getElementById('sl-ang').addEventListener('input', e => {
  INIT_ANGLE_BASE = +e.target.value; updateDevLabels();
});

function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
}

// ─── RESET / COUNTDOWN ────────────────────────────────────────────────────────
const overlay = document.getElementById('countdown-overlay');
function triggerReset() {
  if (counting) return;
  counting = true;
  countVal = 3;
  resetCount++;
  paused = true;
  overlay.style.display = 'block';
  overlay.textContent = countVal;
  const tick = setInterval(() => {
    countVal--;
    if (countVal <= 0) {
      clearInterval(tick);
      counting = false;
      overlay.style.display = 'none';
      paused = false;
      initState();
    } else {
      overlay.textContent = countVal;
    }
  }, 800);
}

// ─── PHYSICS HELPERS ──────────────────────────────────────────────────────────
function rotatePt(px, py, cx, cy, a) {
  const cos = Math.cos(a), sin = Math.sin(a);
  const dx = px - cx, dy = py - cy;
  return [cx + dx*cos - dy*sin, cy + dx*sin + dy*cos];
}

// Get the 4 corners of a paddle in world space
function paddleCorners(p) {
  const hw = dp(AVT_THICK_DP) / 2;
  const hh = dp(AVT_WIDTH_DP) / 2;
  const corners = [
    [-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]
  ];
  return corners.map(([lx, ly]) => {
    const cos = Math.cos(p.angle), sin = Math.sin(p.angle);
    return [p.x + lx*cos - ly*sin, p.y + lx*sin + ly*cos];
  });
}

// Project point onto segment, return closest point + normal from that face
function closestPtOnSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return { cx: ax, cy: ay, t: 0 };
  const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / len2));
  return { cx: ax + t*dx, cy: ay + t*dy, t };
}

function ballCollidePaddle(ball, paddle) {
  const corners = paddleCorners(paddle);
  const r = ball.r;

  // Test all 4 edges
  for (let i = 0; i < 4; i++) {
    const [ax, ay] = corners[i];
    const [bx, by] = corners[(i+1)%4];
    const { cx, cy } = closestPtOnSegment(ball.x, ball.y, ax, ay, bx, by);
    const dx = ball.x - cx, dy = ball.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < r && dist > 0) {
      // Normal pointing away from paddle edge toward ball
      const nx = dx / dist, ny = dy / dist;
      // Push ball out of paddle
      ball.x = cx + nx * (r + 0.5);
      ball.y = cy + ny * (r + 0.5);
      // Reflect velocity
      const dot = ball.vx * nx + ball.vy * ny;
      if (dot < 0) { // only if moving toward surface
        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;
      }
      return true;
    }
  }
  return false;
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
let lastTime = null;

function update(ts) {
  if (lastTime === null) lastTime = ts;
  const dtMs = ts - lastTime;
  lastTime = ts;
  const dt = Math.min(dtMs / 1000, 0.05);

  if (!paused && !counting) {
    // --- Paddle movement ---
    const p = paddles[activePlayer];
    const ms = dp(MOVE_SPEED_DP) * dt;
    if (keys['ArrowLeft'])  p.x -= ms;
    if (keys['ArrowRight']) p.x += ms;
    if (keys['ArrowUp'])    p.y -= ms;
    if (keys['ArrowDown'])  p.y += ms;
    if (keys['q'] || keys['Q']) p.angle -= ROT_SPEED * dt;
    if (keys['w'] || keys['W']) p.angle += ROT_SPEED * dt;

    // Clamp paddle inside game area (simple center clamp)
    const hw = dp(AVT_THICK_DP) / 2 + dp(AVT_WIDTH_DP) / 2;
    p.x = Math.max(hw, Math.min(GW - hw, p.x));
    p.y = Math.max(hw, Math.min(GH - hw, p.y));

    // --- Ball physics ---
    ball.vy += dp(G_BASE) * dt;  // gravity
    ball.x  += ball.vx * dt;
    ball.y  += ball.vy * dt;

    // Wall collisions
    const r = ball.r;
    const tb = dp(MARGIN_TB_DP);
    if (ball.x - r < 0)    { ball.x = r;      ball.vx =  Math.abs(ball.vx); }
    if (ball.x + r > GW)   { ball.x = GW - r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - r < 0)    { ball.y = r;      ball.vy =  Math.abs(ball.vy); }
    // Bottom and sides = out of bounds → reset
    if (ball.y - r > GH || ball.y + r < 0 || ball.x < -r*5 || ball.x > GW + r*5) {
      triggerReset();
    }

    // Paddle collisions
    for (const pd of paddles) {
      ballCollidePaddle(ball, pd);
    }
  }

  draw();
  updateStatus();
  requestAnimationFrame(update);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawPaddle(p, isActive) {
  const hw = dp(AVT_THICK_DP) / 2;
  const hh = dp(AVT_WIDTH_DP) / 2;
  const cos = Math.cos(p.angle), sin = Math.sin(p.angle);

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  const alpha = isActive ? 1.0 : 0.55;

  // Two halves — left half and right half to show two faces
  // Left face (negative x)
  ctx.fillStyle = isActive ? p.highlight2 : p.color2;
  ctx.globalAlpha = alpha;
  ctx.fillRect(-hw, -hh, hw, hh * 2);

  // Right face (positive x)
  ctx.fillStyle = isActive ? p.highlight1 : p.color1;
  ctx.fillRect(0, -hh, hw, hh * 2);

  // Edge highlight
  ctx.strokeStyle = isActive ? 'rgba(255,255,200,0.35)' : 'rgba(120,120,80,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);

  // Active glow dot
  if (isActive) {
    ctx.fillStyle = 'rgba(255,255,180,0.9)';
    ctx.beginPath();
    ctx.arc(0, 0, dp(2), 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBall() {
  const x = ball.x, y = ball.y, r = ball.r;

  // Shadow
  ctx.save();
  ctx.shadowColor = '#fa8a2a';
  ctx.shadowBlur = dp(12);

  const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  grad.addColorStop(0, '#fff8e0');
  grad.addColorStop(0.4, '#faba50');
  grad.addColorStop(1, '#c06010');

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, GW, canvas.height);

  // Background
  ctx.fillStyle = '#181f18';
  ctx.fillRect(0, 0, GW, canvas.height);

  // Game area border (inner)
  const tb = dp(MARGIN_TB_DP);
  ctx.save();
  ctx.translate(0, tb);

  // Grid lines (subtle)
  ctx.strokeStyle = '#1e281e';
  ctx.lineWidth = 0.5;
  const gridStep = dp(50);
  for (let x = 0; x <= GW; x += gridStep) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
  }
  for (let y = 0; y <= GH; y += gridStep) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke();
  }

  // Corner origin marker
  ctx.strokeStyle = '#3a5a3a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GH - dp(20)); ctx.lineTo(0, GH); ctx.lineTo(dp(20), GH);
  ctx.stroke();

  // Draw paddles
  for (let i = 0; i < 2; i++) {
    drawPaddle(paddles[i], i === activePlayer);
  }

  // Draw ball
  drawBall();

  // Game area outline
  ctx.strokeStyle = '#2d3d2d';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, GW, GH);

  ctx.restore();
}

function updateStatus() {
  document.getElementById('st-active').textContent = 'P' + (activePlayer + 1);
  document.getElementById('st-vx').textContent = Math.round(ball.vx);
  document.getElementById('st-vy').textContent = Math.round(ball.vy);
  document.getElementById('st-resets').textContent = resetCount;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resize();
  initState();
});

requestAnimationFrame(update);
</script>
</body>
</html>
