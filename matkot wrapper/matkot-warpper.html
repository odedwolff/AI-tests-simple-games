<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PADDLE · PHYSICS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #111;
  --panel:     #161616;
  --border:    #2c2c2c;
  --green:     #4cff72;
  --green-dim: #1e6630;
  --yellow:    #f0c040;
  --orange:    #ff7020;
  --dim:       #444;
  --text:      #bbb;
  --text-dim:  #555;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
}

#layout {
  display: flex;
  width: 100vw;
  height: 100vh;
}

/* ── Panels ── */
.side-panel {
  flex: 0 0 150px;          /* matches 150 d-px @ 1000-wide reference */
  background: var(--panel);
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow: hidden;
  position: relative;
}
#left-panel  { border-right: 1px solid var(--border); }
#right-panel { border-left:  1px solid var(--border); }

.panel-head {
  font-family: 'Teko', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--orange);
  padding: 10px 10px 6px;
  border-bottom: 1px solid var(--border);
}

/* ── Dev controls ── */
.dev-block {
  padding: 8px 10px 4px;
  border-bottom: 1px solid var(--border);
}
.dev-block label {
  display: block;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--green-dim);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.dev-block input[type=number] {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  padding: 4px 6px;
  outline: none;
  -moz-appearance: textfield;
}
.dev-block input[type=number]::-webkit-inner-spin-button,
.dev-block input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.dev-block input[type=number]:focus { border-color: var(--green-dim); }

/* ── Right panel ── */
.ctrl-btn {
  margin: 8px 10px 0;
  padding: 7px 0;
  width: calc(100% - 20px);
  background: #1c1c1c;
  border: 1px solid var(--border);
  color: var(--yellow);
  font-family: 'Teko', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
}
.ctrl-btn:hover { background: #252525; border-color: var(--yellow); }
.ctrl-btn.active { color: var(--orange); border-color: var(--orange); }

/* player info */
.pinfo {
  margin: 10px 10px 0;
  padding: 7px 8px;
  border: 1px solid var(--border);
  background: #181818;
}
.pinfo .pname {
  font-family: 'Teko', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.pinfo .pstat {
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.7;
}
.pinfo .pstat span { color: var(--green); }

.key-legend {
  margin-top: auto;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  font-size: 9px;
  line-height: 1.9;
  color: var(--text-dim);
}
.key-legend b { color: var(--orange); font-weight: normal; }

/* ── Canvas area ── */
#game-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  /* 10 d-px margins top/bottom — handled by canvas sizing in JS */
}

canvas {
  display: block;
  background: #0d0d0d;
  border: 1px solid #222;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<div id="layout">

  <!-- ═══ LEFT PANEL ═══ -->
  <div class="side-panel" id="left-panel">
    <div class="panel-head">Dev Panel</div>

    <div class="dev-block">
      <label>G (dpx/s²)</label>
      <input type="number" id="inp-g" value="123" step="1">
    </div>
    <div class="dev-block">
      <label>Init Speed (dpx/s)</label>
      <input type="number" id="inp-speed" value="400" step="10">
    </div>
    <div class="dev-block">
      <label>Init Angle (°)</label>
      <input type="number" id="inp-angle" value="49" step="1">
    </div>
    <div class="dev-block">
      <label>Ball Radius (dpx)</label>
      <input type="number" id="inp-brad" value="5" step="0.5" min="1">
    </div>

    <div class="key-legend">
      <b>ARROWS</b> — move paddle<br>
      <b>Q / W</b> — rotate<br>
      <b>A / S</b> — wraps ±<br>
      <b>TAB</b> — switch player<br>
      <b>SPACE</b> — pause
    </div>
  </div>

  <!-- ═══ CANVAS ═══ -->
  <div id="game-wrap">
    <canvas id="c"></canvas>
  </div>

  <!-- ═══ RIGHT PANEL ═══ -->
  <div class="side-panel" id="right-panel">
    <div class="panel-head">Controls</div>

    <button class="ctrl-btn" id="btn-restart">↺ Restart</button>
    <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>

    <div style="padding:10px 10px 0; border-top:1px solid var(--border); margin-top:12px;">
      <div style="font-size:9px; letter-spacing:2px; color:var(--orange); text-transform:uppercase; margin-bottom:6px;">Players</div>
    </div>

    <div class="pinfo" id="pi0">
      <div class="pname" style="color:var(--yellow)">P1</div>
      <div class="pstat">Wraps: <span id="pw0">2</span></div>
      <div class="pstat" id="pact0" style="color:var(--yellow)">◉ ACTIVE</div>
    </div>
    <div class="pinfo" id="pi1">
      <div class="pname" style="color:var(--text-dim)">P2</div>
      <div class="pstat">Wraps: <span id="pw1">2</span></div>
      <div class="pstat" id="pact1" style="color:var(--text-dim)">◎ idle</div>
    </div>

    <div class="key-legend" style="margin-top:auto">
      Wraps affect bounce<br>energy multiplier:<br>
      0→×2.0 &nbsp;4→×0.3
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ════════════════════════════════════════════════════
const AVT_WIDTH = 75;   // d-px  (long axis)
const AVT_THICK = 10;   // d-px  (short axis)
const WRAP_MULT  = [2.0, 1.5, 1.0, 0.7, 0.3];
const WRAP_GAP   = 4;   // canvas-px between contour lines
const MOVE_SPD   = 250; // d-px/s  paddle translation speed
const ROT_SPD    = 2.2; // rad/s   paddle rotation speed
const CD_SECS    = 3;   // countdown before restart

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// Live params (read from inputs)
let G, INIT_SPEED, INIT_ANGLE_DEG, BALL_RAD_DPX;

function readParams() {
  G             = parseFloat(document.getElementById('inp-g').value)     || 123;
  INIT_SPEED    = parseFloat(document.getElementById('inp-speed').value)  || 400;
  INIT_ANGLE_DEG= parseFloat(document.getElementById('inp-angle').value)  || 49;
  BALL_RAD_DPX  = parseFloat(document.getElementById('inp-brad').value)   || 5;
}

// d-px → canvas-px conversion (depends on canvas width)
function dp(v) { return v * canvas.width / 1000; }

// ════════════════════════════════════════════════════
//  SIZING
// ════════════════════════════════════════════════════
function resizeCanvas() {
  // "game panel" = total width minus 2×150 d-px side panels
  // We can't use d-px directly for layout because d-px is 1/1000 of total screen width,
  // so the canvas just fills the flex-remaining area; side panels are fixed 150px CSS.
  const wrap = document.getElementById('game-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  // The spec says 10 d-px margin top & bottom.
  // d-px is relative to the *screen* width (= window.innerWidth).
  const margin = 10 * window.innerWidth / 1000;
  canvas.width  = W;
  canvas.height = H - 2 * margin;
}

// ════════════════════════════════════════════════════
//  GAME OBJECTS
// ════════════════════════════════════════════════════
let paddles = [];
let ball     = {};
let activePl = 0;
let paused   = false;
let countdown= -1;  // ≥0 means counting down

function initPaddles() {
  paddles = [
    { x: canvas.width * 0.32,  y: canvas.height * 0.38, angle: Math.PI/2, wraps: 2 },
    { x: canvas.width * 0.68,  y: canvas.height * 0.58, angle: Math.PI/2, wraps: 2 },
  ];
}

function initBall() {
  const a = INIT_ANGLE_DEG * Math.PI / 180;
  const spd = dp(INIT_SPEED);
  ball = {
    x:  dp(20),
    y:  canvas.height - dp(20),
    vx:  spd * Math.cos(a),
    vy: -spd * Math.sin(a),
  };
}

function fullRestart() {
  readParams();
  resizeCanvas();
  initPaddles();
  initBall();
  countdown = -1;
  paused    = false;
  document.getElementById('btn-pause').textContent = '⏸ Pause';
  document.getElementById('btn-pause').classList.remove('active');
  updateHUD();
}

// ════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════
const keys = {};

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const isInput = (tag === 'INPUT' || tag === 'TEXTAREA');

  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab',' '].includes(e.key))
    e.preventDefault();

  keys[e.key] = true;

  if (isInput) return; // don't process game hotkeys when typing in dev panel

  switch (e.key) {
    case 'Tab':
      activePl = 1 - activePl;
      updateHUD();
      break;
    case 'a': case 'A':
      paddles[activePl].wraps = Math.min(4, paddles[activePl].wraps + 1);
      updateHUD();
      break;
    case 's': case 'S':
      paddles[activePl].wraps = Math.max(0, paddles[activePl].wraps - 1);
      updateHUD();
      break;
    case ' ':
      togglePause();
      break;
  }
});

document.addEventListener('keyup', e => { keys[e.key] = false; });

// Blur dev inputs on Enter / change so they don't swallow arrow keys
['inp-g','inp-speed','inp-angle','inp-brad'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', () => { readParams(); el.blur(); });
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { readParams(); el.blur(); } });
});

document.getElementById('btn-restart').addEventListener('click', fullRestart);
document.getElementById('btn-pause').addEventListener('click', togglePause);

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  btn.classList.toggle('active', paused);
}

// ════════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════════
function updateHUD() {
  for (let i = 0; i < 2; i++) {
    document.getElementById(`pw${i}`).textContent = paddles[i].wraps;
    const pact = document.getElementById(`pact${i}`);
    const pname = document.querySelector(`#pi${i} .pname`);
    if (i === activePl) {
      pact.textContent  = '◉ ACTIVE';
      pact.style.color  = 'var(--yellow)';
      pname.style.color = 'var(--yellow)';
    } else {
      pact.textContent  = '◎ idle';
      pact.style.color  = 'var(--text-dim)';
      pname.style.color = 'var(--text-dim)';
    }
  }
}

// ════════════════════════════════════════════════════
//  PHYSICS
// ════════════════════════════════════════════════════

// Returns closest point on OBB to point (px,py), and the normal from box surface
function closestOnOBB(px, py, pad) {
  const cos = Math.cos(pad.angle), sin = Math.sin(pad.angle);
  const hw = dp(AVT_WIDTH) / 2, ht = dp(AVT_THICK) / 2;
  const dx = px - pad.x, dy = py - pad.y;
  // local coords
  const lx = cos*dx + sin*dy;
  const ly = -sin*dx + cos*dy;
  // clamp to box
  const cx = Math.max(-hw, Math.min(hw, lx));
  const cy = Math.max(-ht, Math.min(ht, ly));
  const nx_l = lx - cx, ny_l = ly - cy;
  const dist2 = nx_l*nx_l + ny_l*ny_l;
  // world-space closest point
  const wx = pad.x + cos*cx - sin*cy;
  const wy = pad.y + sin*cx + cos*cy;
  return { wx, wy, nx_l, ny_l, dist2,
           // inside: lx,ly inside box?
           inside: Math.abs(lx) <= hw && Math.abs(ly) <= ht };
}

function collideBallPaddle(pad) {
  const r = dp(BALL_RAD_DPX);
  const { wx, wy, nx_l, ny_l, dist2, inside } = closestOnOBB(ball.x, ball.y, pad);
  if (!inside && dist2 >= r*r) return;

  const dist = Math.sqrt(dist2) || 0.001;
  const cos = Math.cos(pad.angle), sin = Math.sin(pad.angle);

  let nx, ny;
  if (inside) {
    // push out through nearest face
    const hw = dp(AVT_WIDTH)/2, ht = dp(AVT_THICK)/2;
    const lx = cos*(ball.x-pad.x) + sin*(ball.y-pad.y);
    const ly = -sin*(ball.x-pad.x) + cos*(ball.y-pad.y);
    const ox = hw - Math.abs(lx), oy = ht - Math.abs(ly);
    if (ox < oy) {
      const s = lx < 0 ? -1 : 1;
      nx = cos*s; ny = sin*s;
      ball.x += nx*(ox+1); ball.y += ny*(ox+1);
    } else {
      const s = ly < 0 ? -1 : 1;
      nx = -sin*s; ny = cos*s;
      ball.x += nx*(oy+1); ball.y += ny*(oy+1);
    }
  } else {
    nx = (cos*nx_l - sin*ny_l)/dist;
    ny = (sin*nx_l + cos*ny_l)/dist;
    const pen = r - dist;
    ball.x += nx*pen; ball.y += ny*pen;
  }

  // reflect velocity only if moving toward surface
  const vdotn = ball.vx*nx + ball.vy*ny;
  if (vdotn < 0) {
    // KE-scaled reflection
    const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    ball.vx -= 2*vdotn*nx;
    ball.vy -= 2*vdotn*ny;
    // rescale speed by wrap multiplier (energy: KE ∝ v², so v_new = v_old*√mult)
    const mult = WRAP_MULT[pad.wraps];
    const newSpeed = speed * Math.sqrt(mult);
    const curSpeed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (curSpeed > 0.001) {
      ball.vx = ball.vx/curSpeed*newSpeed;
      ball.vy = ball.vy/curSpeed*newSpeed;
    }
  }
}

// ════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════
let lastTs = null;

function update(dt) {
  if (paused) return;

  // Countdown state
  if (countdown >= 0) {
    countdown -= dt;
    if (countdown < 0) fullRestart();
    return;
  }

  // ── Active paddle movement ──
  const p = paddles[activePl];
  const ms = dp(MOVE_SPD) * dt;

  if (keys['ArrowLeft'])  p.x -= ms;
  if (keys['ArrowRight']) p.x += ms;
  if (keys['ArrowUp'])    p.y -= ms;
  if (keys['ArrowDown'])  p.y += ms;
  if (keys['q'] || keys['Q']) p.angle -= ROT_SPD * dt;
  if (keys['w'] || keys['W']) p.angle += ROT_SPD * dt;

  // Clamp paddles inside canvas with some padding
  for (const pd of paddles) {
    const half = dp(AVT_WIDTH)/2 + dp(AVT_THICK)/2 + WRAP_GAP*4 + 2;
    pd.x = Math.max(half, Math.min(canvas.width  - half, pd.x));
    pd.y = Math.max(half, Math.min(canvas.height - half, pd.y));
  }

  // ── Ball physics ──
  ball.vy += dp(G) * dt;
  ball.x  += ball.vx * dt;
  ball.y  += ball.vy * dt;

  // Collisions
  for (const pd of paddles) collideBallPaddle(pd);

  // Out-of-bounds check
  const r = dp(BALL_RAD_DPX);
  if (ball.x + r < 0 || ball.x - r > canvas.width ||
      ball.y + r < 0 || ball.y - r > canvas.height) {
    countdown = CD_SECS;
  }
}

// ════════════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════════════
function drawGrid() {
  const step = canvas.width * 0.04;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = step; x < canvas.width;  x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = step; y < canvas.height; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y);   ctx.stroke(); }
}

function drawPaddle(pd, isActive) {
  const hw = dp(AVT_WIDTH)/2, ht = dp(AVT_THICK)/2;

  ctx.save();
  ctx.translate(pd.x, pd.y);
  ctx.rotate(pd.angle);

  // ── Contour wraps ──
  for (let w = pd.wraps; w >= 1; w--) {
    const g = WRAP_GAP * w;
    const alpha = isActive ? (0.55 - w*0.08) : (0.22 - w*0.03);
    ctx.strokeStyle = `rgba(76,255,114,${Math.max(0.05,alpha)})`;
    ctx.lineWidth = 0.8;
    ctx.strokeRect(-hw-g, -ht-g, (hw+g)*2, (ht+g)*2);
  }

  // ── Body: two distinct long-face colours ──
  // "top" long face (negative local Y): orange tone
  // "bottom" long face (positive local Y): green tone
  const bright = isActive ? 1 : 0.4;

  // top half
  const topGrad = ctx.createLinearGradient(0, -ht, 0, 0);
  topGrad.addColorStop(0, `rgba(255,110,32,${bright})`);
  topGrad.addColorStop(1, `rgba(200,80,10,${bright*0.8})`);
  ctx.fillStyle = topGrad;
  ctx.fillRect(-hw, -ht, hw*2, ht);

  // bottom half
  const botGrad = ctx.createLinearGradient(0, 0, 0, ht);
  botGrad.addColorStop(0, `rgba(30,180,60,${bright*0.9})`);
  botGrad.addColorStop(1, `rgba(10,110,30,${bright*0.6})`);
  ctx.fillStyle = botGrad;
  ctx.fillRect(-hw, 0, hw*2, ht);

  // center divider
  ctx.strokeStyle = `rgba(255,255,255,${isActive ? 0.25 : 0.08})`;
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(-hw, 0); ctx.lineTo(hw, 0); ctx.stroke();

  // border
  ctx.strokeStyle = isActive ? '#f0c040' : '#333';
  ctx.lineWidth   = isActive ? 1.5 : 0.7;
  if (isActive) { ctx.shadowColor = '#f0c040'; ctx.shadowBlur = 10; }
  ctx.strokeRect(-hw, -ht, hw*2, ht*2);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawBall() {
  const r  = dp(BALL_RAD_DPX);
  const bx = ball.x, by = ball.y;

  // glow halo
  const halo = ctx.createRadialGradient(bx, by, 0, bx, by, r*4);
  halo.addColorStop(0, 'rgba(240,192,64,0.25)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(bx, by, r*4, 0, Math.PI*2); ctx.fill();

  // ball
  const g = ctx.createRadialGradient(bx-r*0.3, by-r*0.35, r*0.05, bx, by, r);
  g.addColorStop(0,   '#fff8d8');
  g.addColorStop(0.45,'#f0c040');
  g.addColorStop(1,   '#a05000');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
}

function drawHUD() {
  // speed readout
  const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy) / (canvas.width/1000);
  ctx.font = `${canvas.width*0.016}px Share Tech Mono, monospace`;
  ctx.fillStyle = 'rgba(76,255,114,0.5)';
  ctx.textAlign = 'left';
  ctx.fillText(`v ${spd.toFixed(0)} dpx/s`, 6, canvas.height - 6);

  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(240,192,64,0.5)';
  ctx.fillText(`P${activePl+1} ACTIVE`, canvas.width - 6, canvas.height - 6);
}

function drawCountdown() {
  const secs = Math.ceil(Math.max(0, countdown));
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#f0c040';
  ctx.font = `bold ${canvas.width*0.18}px Teko, sans-serif`;
  ctx.fillText(secs > 0 ? secs : '', canvas.width/2, canvas.height/2 - canvas.height*0.04);

  ctx.fillStyle = '#888';
  ctx.font = `${canvas.width*0.025}px Share Tech Mono, monospace`;
  ctx.fillText('OUT OF BOUNDS — RESTARTING', canvas.width/2, canvas.height/2 + canvas.height*0.1);
  ctx.textBaseline = 'alphabetic';
}

function drawPausedOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#f0c040';
  ctx.font = `bold ${canvas.width*0.09}px Teko, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
  ctx.textBaseline = 'alphabetic';
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawPaddle(paddles[0], activePl === 0);
  drawPaddle(paddles[1], activePl === 1);
  drawBall();
  drawHUD();
  if (countdown >= 0)  drawCountdown();
  if (paused)          drawPausedOverlay();
}

// ════════════════════════════════════════════════════
//  LOOP
// ════════════════════════════════════════════════════
function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const prevW = canvas.width, prevH = canvas.height;
  resizeCanvas();
  // Scale paddle positions proportionally
  if (prevW && prevH) {
    for (const pd of paddles) {
      pd.x = pd.x / prevW * canvas.width;
      pd.y = pd.y / prevH * canvas.height;
    }
  }
});

fullRestart();
updateHUD();
requestAnimationFrame(loop);
</script>
</body>
</html>
