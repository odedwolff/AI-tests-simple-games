<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLUBBALL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f0d;
    --panel-bg: #111411;
    --border: #1e2a1e;
    --green: #39ff14;
    --green-dim: #1a6b08;
    --yellow: #f5c518;
    --orange: #ff6b1a;
    --gray: #2a2e2a;
    --gray-light: #3d443d;
    --text: #a8b5a8;
    --white: #e8f0e8;
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #root {
    display: flex;
    width: 100vw;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }

  #left-panel {
    width: 15vw;
    height: calc(100vh - 10vh);
    padding: 8px 10px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  #left-panel h3 {
    font-family: 'Orbitron', sans-serif;
    color: var(--green);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 4px;
  }

  .param-row {
    margin-bottom: 7px;
  }

  .param-label {
    color: var(--green);
    font-size: 10px;
    display: block;
    margin-bottom: 2px;
    line-height: 1.2;
  }

  .param-row input[type="number"] {
    width: 100%;
    background: var(--gray);
    border: 1px solid var(--green-dim);
    color: var(--yellow);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 5px;
    outline: none;
  }

  .param-row input[type="number"]:focus {
    border-color: var(--green);
  }

  #game-wrapper {
    flex: 1;
    height: calc(100vh - 10vh);
    margin: 5vh 0;
    position: relative;
    border: 1.5px solid var(--green-dim);
    box-shadow: 0 0 18px #39ff1422, inset 0 0 8px #0002;
    background: #0a0c0a;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #right-panel {
    width: 15vw;
    height: calc(100vh - 10vh);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  #right-panel h3 {
    font-family: 'Orbitron', sans-serif;
    color: var(--green);
    font-size: 10px;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 4px;
    width: 100%;
    text-align: center;
  }

  .ctrl-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border: 1px solid var(--green-dim);
    background: var(--gray);
    color: var(--green);
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, border-color 0.15s;
  }

  .ctrl-btn:hover {
    background: #1a2a1a;
    border-color: var(--green);
  }

  .ctrl-btn:active {
    background: var(--green-dim);
  }

  #status-box {
    width: 100%;
    font-size: 10px;
    color: var(--orange);
    text-align: center;
    min-height: 20px;
    margin-top: 6px;
  }

  #title-logo {
    font-family: 'Orbitron', sans-serif;
    color: var(--green);
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 12px;
    text-shadow: 0 0 8px var(--green);
  }

  #active-club-display {
    font-size: 10px;
    color: var(--yellow);
    text-align: center;
    width: 100%;
  }

  .key-hint {
    font-size: 9px;
    color: var(--gray-light);
    text-align: center;
    line-height: 1.6;
    margin-top: 6px;
  }

  #left-panel::-webkit-scrollbar { width: 4px; }
  #left-panel::-webkit-scrollbar-track { background: var(--bg); }
  #left-panel::-webkit-scrollbar-thumb { background: var(--green-dim); }
</style>
</head>
<body>
<div id="root">

  <!-- LEFT DEV PANEL -->
  <div id="left-panel">
    <div id="title-logo">CLUBBALL</div>
    <h3>DEV PARAMS</h3>
    <!-- params injected by JS -->
  </div>

  <!-- GAME CANVAS -->
  <div id="game-wrapper">
    <canvas id="gc"></canvas>
  </div>

  <!-- RIGHT CONTROL PANEL -->
  <div id="right-panel">
    <h3>CONTROLS</h3>
    <button class="ctrl-btn" id="btn-restart">⟳ RESTART</button>
    <button class="ctrl-btn" id="btn-pause">⏸ PAUSE</button>
    <div id="status-box"></div>
    <div id="active-club-display">ACTIVE: CLUB 1</div>
    <div class="key-hint">
      ← → MOVE<br>
      ↑ JUMP<br>
      Q / W ROTATE<br>
      TAB SWITCH CLUB<br>
      SPACE LOAD/RELEASE
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS (mutable via dev panel) ───────────────────────────────────────
const C = {
  G: 50,
  NET_DIST_FROM_LEFT_VW: 35,
  AVT_LENGTH: 8,
  AVT_THICK: 2,
  INIT_JMP_SPEED: 60,
  HOVER_DIST: 2,
  LOADBACK_SPD: 5,
  LOADBACK_RANGE: 5,
  MAX_RLS_SPEED: 20,
  KIN_LOSS: 0.15,
  INIT_BALL_ANGL: 49,
  INIT_BALL_SPEED: 50,
  BALL_RAD: 2.5,
};

// Dev panel param meta
const PARAMS = [
  {key:'G', label:'G (vh/s²)', min:1, max:200, step:1},
  {key:'NET_DIST_FROM_LEFT_VW', label:'NET_DIST (vw)', min:10, max:70, step:0.5},
  {key:'AVT_LENGTH', label:'AVT_LENGTH (vw)', min:2, max:20, step:0.5},
  {key:'AVT_THICK', label:'AVT_THICK (vw)', min:0.5, max:6, step:0.1},
  {key:'INIT_JMP_SPEED', label:'INIT_JMP_SPEED', min:10, max:150, step:1},
  {key:'HOVER_DIST', label:'HOVER_DIST (vh)', min:0, max:20, step:0.1},
  {key:'LOADBACK_SPD', label:'LOADBACK_SPD', min:1, max:30, step:0.5},
  {key:'LOADBACK_RANGE', label:'LOADBACK_RANGE', min:1, max:15, step:0.5},
  {key:'MAX_RLS_SPEED', label:'MAX_RLS_SPEED', min:5, max:80, step:1},
  {key:'KIN_LOSS', label:'KIN_LOSS', min:0, max:0.9, step:0.01},
  {key:'INIT_BALL_ANGL', label:'INIT_BALL_ANGL (°)', min:1, max:89, step:1},
  {key:'INIT_BALL_SPEED', label:'INIT_BALL_SPEED', min:5, max:150, step:1},
  {key:'BALL_RAD', label:'BALL_RAD (vw)', min:0.5, max:10, step:0.1},
];

// Build dev panel
const leftPanel = document.getElementById('left-panel');
PARAMS.forEach(p => {
  const row = document.createElement('div');
  row.className = 'param-row';
  const lbl = document.createElement('label');
  lbl.className = 'param-label';
  lbl.textContent = p.label;
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.min = p.min; inp.max = p.max; inp.step = p.step;
  inp.value = C[p.key];
  inp.addEventListener('change', () => {
    C[p.key] = parseFloat(inp.value);
  });
  inp.addEventListener('keydown', e => {
    if(e.key === 'Enter') { inp.blur(); }
  });
  // Blur on mouseup to prevent accidental changes while playing
  inp.addEventListener('mouseup', () => { inp.blur(); });
  row.appendChild(lbl);
  row.appendChild(inp);
  leftPanel.appendChild(row);
});

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('game-wrapper');

let W, H; // px dimensions of canvas

function resize() {
  W = wrapper.clientWidth;
  H = wrapper.clientHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); });

// Unit helpers: convert vw/vh to px at runtime
function vw(x) { return x * W / 100; }
function vh(x) { return x * H / 100; }

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let paused = false;
let countdownActive = false;
let countdownTimer = 0;
let lastTime = null;

// Input state
const keys = {};
window.addEventListener('keydown', e => {
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Tab'].includes(e.key)) e.preventDefault();
  if(e.key === 'Tab') {
    e.preventDefault();
    if(!paused && !countdownActive) switchActiveClub();
    return;
  }
  keys[e.key] = true;
  if(e.key === ' ' && !paused) {
    if(!club[activeClub].loadSpaceHeld) {
      club[activeClub].loadSpaceHeld = true;
      club[activeClub].loadBackTarget = true;
    }
  }
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if(e.key === ' ') {
    club[activeClub].loadSpaceHeld = false;
    club[activeClub].releaseTriggered = true;
  }
});

let activeClub = 0;
function switchActiveClub() {
  activeClub = 1 - activeClub;
  document.getElementById('active-club-display').textContent = `ACTIVE: CLUB ${activeClub+1}`;
}

// ─── CLUB CLASS ──────────────────────────────────────────────────────────────
class Club {
  constructor(id) {
    this.id = id;
    this.reset();
  }

  reset() {
    // Initial position: both clubs in right field, stacked
    // Initial angle: side1 facing left-upward diagonally (pointing -135 deg)
    // "pointy back (side2) pointing down-right" => angle = -45 deg from horizontal for side1 face
    const rightStart = vw(C.NET_DIST_FROM_LEFT_VW) + vw(8) + vw(4) * this.id;
    this.x = vw(C.NET_DIST_FROM_LEFT_VW) + vw(12) + vw(5) * this.id;
    this.y = H - vh(C.HOVER_DIST) - vw(C.AVT_THICK)/2;
    this.angle = -Math.PI * 3/4; // side1 facing up-left
    this.vx = 0;
    this.vy = 0;
    this.onGround = true;
    this.jumping = false;
    this.loadOffset = 0; // current load back amount in px
    this.loadSpaceHeld = false;
    this.releaseTriggered = false;
    this.loadVx = 0; // velocity of load/release
    this.bumpVx = 0;
    this.bumpVy = 0;
  }

  get halfLen() { return vw(C.AVT_LENGTH) / 2; }
  get thick() { return vw(C.AVT_THICK); }
  get bumpDepth() { return vw(3); }

  // Returns the four corners of the main rectangle (no bump)
  getCorners(ox=0, oy=0) {
    const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
    const hl = this.halfLen, ht = this.thick / 2;
    // local: side1 at -y (top face), side2 at +y (bottom face)
    return [
      {x: this.x + ox + cos*(-hl) - sin*(-ht), y: this.y + oy + sin*(-hl) + cos*(-ht)}, // side1-left
      {x: this.x + ox + cos*(hl)  - sin*(-ht), y: this.y + oy + sin*(hl)  + cos*(-ht)}, // side1-right
      {x: this.x + ox + cos*(hl)  - sin*(ht),  y: this.y + oy + sin*(hl)  + cos*(ht)},  // side2-right
      {x: this.x + ox + cos*(-hl) - sin*(ht),  y: this.y + oy + sin*(-hl) + cos*(ht)},  // side2-left
    ];
  }

  // side2 normal direction (outward from side2 face)
  getSide2Normal() {
    const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
    // side2 faces +y locally => world normal = (sin(angle) rotated): actually local +y => world (sin, -cos) ... no
    // local y-axis in world = (sin(angle), -cos(angle))... let's think:
    // local x = (cos, sin), local y = (-sin, cos)
    // side2 is at local +y, so outward normal = local +y direction = (-sin(angle), cos(angle))
    return { x: -sin, y: cos };
  }

  getSide1Normal() {
    const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
    return { x: sin, y: -cos };
  }

  // The displacement for load-back: along side2 normal direction
  getLoadDisp() {
    const n = this.getSide2Normal();
    return { x: n.x * this.loadOffset, y: n.y * this.loadOffset };
  }

  update(dt, clubOther) {
    const isActive = this.id === activeClub;
    const netX = vw(C.NET_DIST_FROM_LEFT_VW);
    const groundY = H - 0; // ground at H
    const hoverY = H - vh(C.HOVER_DIST) - this.thick / 2;
    const minX = netX + this.halfLen + vw(0.5);
    const maxX = W - this.halfLen - vw(0.5);

    // Gravity / vertical
    if(!this.onGround) {
      this.vy += vh(C.G) * dt;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Land
    if(this.y >= hoverY) {
      this.y = hoverY;
      this.vy = 0;
      this.vx = 0;
      this.onGround = true;
      this.jumping = false;
    }

    // Horizontal movement (only if not jumping, or rather, no control during jump)
    if(!this.jumping && isActive) {
      const spd = vw(20); // move speed
      if(keys['ArrowLeft'])  this.x -= spd * dt;
      if(keys['ArrowRight']) this.x += spd * dt;
    }

    // Rotation
    if(isActive) {
      const rotSpd = 2.5; // rad/sec
      if(keys['q'] || keys['Q']) this.angle -= rotSpd * dt;
      if(keys['w'] || keys['W']) this.angle += rotSpd * dt;
    }

    // Jump
    if(!this.jumping && this.onGround && isActive && keys['ArrowUp']) {
      this.vy = -vh(C.INIT_JMP_SPEED);
      this.onGround = false;
      this.jumping = true;
    }

    // Constrain X
    if(this.x < minX) this.x = minX;
    if(this.x > maxX) this.x = maxX;

    // ── Load back / release ──
    const lv = vw(C.LOADBACK_SPD);
    const maxLoad = vw(C.LOADBACK_RANGE);
    const relSpd = vw(C.MAX_RLS_SPEED);

    if(this.loadSpaceHeld && isActive) {
      // Load back (increase offset along side2)
      if(this.loadOffset < maxLoad) {
        this.loadOffset = Math.min(maxLoad, this.loadOffset + lv * dt);
      }
    } else if(this.releaseTriggered) {
      // Release - spring back fast, will set velocity for impact
      const ratio = this.loadOffset / maxLoad;
      const releaseV = relSpd * ratio; // speed of release
      // Store release velocity to apply to ball contact
      this._releaseV = releaseV;
      this._releaseN = this.getSide1Normal(); // side1 faces outward
      this.loadOffset = Math.max(0, this.loadOffset - releaseV * 5 * dt);
      if(this.loadOffset <= 0) {
        this.loadOffset = 0;
        this.releaseTriggered = false;
        this._releaseV = 0;
      }
    }

    // Club-club collision (simple: push apart)
    if(clubOther) {
      const dx = this.x - clubOther.x, dy = this.y - clubOther.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const minDist = this.halfLen * 0.7;
      if(dist < minDist && dist > 0.001) {
        const push = (minDist - dist) / 2;
        this.x += dx/dist * push;
        this.y += dy/dist * push;
        clubOther.x -= dx/dist * push;
        clubOther.y -= dy/dist * push;
      }
    }
  }

  draw(isActive) {
    ctx.save();
    const ld = this.getLoadDisp();
    const cx = this.x + ld.x;
    const cy = this.y + ld.y;

    ctx.translate(cx, cy);
    ctx.rotate(this.angle);

    const hl = this.halfLen;
    const ht = this.thick / 2;
    const bumpD = this.bumpDepth;

    // side1 face color (bright) - local top (-y) = bright
    // side2 face color (dark) - local bottom (+y) = dim
    const isActive1 = isActive;
    const col1 = isActive1 ? (this.id===0 ? '#f5c518' : '#ff6b1a') : (this.id===0 ? '#7a6610' : '#7a3410');
    const col2 = isActive1 ? (this.id===0 ? '#4a4010' : '#4a2410') : (this.id===0 ? '#2a2208' : '#2a1408');

    // Draw main rectangle - side1 top half
    ctx.fillStyle = col1;
    ctx.fillRect(-hl, -ht, hl*2, ht);

    // side2 bottom half
    ctx.fillStyle = col2;
    ctx.fillRect(-hl, 0, hl*2, ht);

    // Border
    ctx.strokeStyle = isActive1 ? '#ffffff30' : '#ffffff10';
    ctx.lineWidth = 1;
    ctx.strokeRect(-hl, -ht, hl*2, ht*2);

    // Active glow line on side1
    if(isActive1) {
      ctx.strokeStyle = this.id===0 ? '#f5c518' : '#ff6b1a';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-hl, -ht);
      ctx.lineTo(hl, -ht);
      ctx.stroke();
    }

    // Bump on side2 (outward = +y direction locally)
    // Bump is a triangle or wedge sticking out from side2 face
    const bumpW = hl * 0.5;
    ctx.fillStyle = isActive1 ? (this.id===0 ? '#d4a800' : '#d44a00') : '#2a2208';
    ctx.beginPath();
    ctx.moveTo(-bumpW/2, ht);
    ctx.lineTo(bumpW/2, ht);
    ctx.lineTo(0, ht + bumpD);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ffffff18';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }

  // Returns list of line segments for collision: [{p1,p2, side:'side1'|'side2'|'bump'}]
  getSegments() {
    const ld = this.getLoadDisp();
    const ox = ld.x, oy = ld.y;
    const corners = this.getCorners(ox, oy);
    // corners: 0=side1-left, 1=side1-right, 2=side2-right, 3=side2-left
    const bumpDepth = this.bumpDepth;
    const cos = Math.cos(this.angle), sin = Math.sin(this.angle);
    const halfBump = vw(C.AVT_LENGTH) * 0.25;
    // bump tip
    const bumpTip = {
      x: this.x + ox + (-sin) * (this.thick/2 + bumpDepth),
      y: this.y + oy + cos * (this.thick/2 + bumpDepth)
    };
    const bumpL = {
      x: corners[3].x + (cos * -halfBump - sin * 0),
      y: corners[3].y + (sin * -halfBump + cos * 0)
    };
    const bumpR = {
      x: corners[2].x + (cos * halfBump - sin * 0),
      y: corners[2].y + (sin * halfBump + cos * 0)
    };
    // Approximate bump with midpoint of side2 edge
    const bumpMid = {
      x: (corners[2].x + corners[3].x)/2,
      y: (corners[2].y + corners[3].y)/2,
    };

    return [
      {p1: corners[0], p2: corners[1], side: 'side1'},
      {p1: corners[1], p2: corners[2], side: 'end'},
      {p1: corners[2], p2: corners[3], side: 'side2'},
      {p1: corners[3], p2: corners[0], side: 'end'},
      // bump faces
      {p1: corners[3], p2: bumpTip, side: 'side2'},
      {p1: bumpTip, p2: corners[2], side: 'side2'},
    ];
  }
}

// ─── BALL ────────────────────────────────────────────────────────────────────
let ball = { x:0, y:0, vx:0, vy:0 };

function initBall() {
  ball.x = vw(1);
  ball.y = H - vw(C.BALL_RAD) - vh(1);
  const ang = C.INIT_BALL_ANGL * Math.PI / 180;
  const spd = vw(C.INIT_BALL_SPEED);
  ball.vx = spd * Math.cos(ang);
  ball.vy = -spd * Math.sin(ang);
}

// ─── CLUBS ───────────────────────────────────────────────────────────────────
let club = [new Club(0), new Club(1)];

function resetGame() {
  activeClub = 0;
  document.getElementById('active-club-display').textContent = `ACTIVE: CLUB 1`;
  club[0].reset();
  club[1].reset();
  // Reposition based on current C values
  const netX = vw(C.NET_DIST_FROM_LEFT_VW);
  const hoverY = H - vh(C.HOVER_DIST) - vw(C.AVT_THICK)/2;
  club[0].x = netX + vw(8);
  club[0].y = hoverY;
  club[0].angle = -Math.PI * 3/4;
  club[1].x = netX + vw(14);
  club[1].y = hoverY;
  club[1].angle = -Math.PI * 3/4;
  initBall();
  countdownActive = false;
  setStatus('');
}

// ─── NET ─────────────────────────────────────────────────────────────────────
function getNetX() { return vw(C.NET_DIST_FROM_LEFT_VW); }
const NET_THICKNESS = 6; // px
const NET_HEIGHT_VH = 18; // vh

// ─── COLLISION HELPERS ───────────────────────────────────────────────────────
// Closest point on segment to point P
function closestPointOnSegment(px, py, ax, ay, bx, by) {
  const abx = bx-ax, aby = by-ay;
  const apx = px-ax, apy = py-ay;
  const t = Math.max(0, Math.min(1, (apx*abx + apy*aby)/(abx*abx+aby*aby+1e-9)));
  return {x: ax+t*abx, y: ay+t*aby, t};
}

function distToSegment(px, py, ax, ay, bx, by) {
  const cp = closestPointOnSegment(px,py,ax,ay,bx,by);
  const dx=px-cp.x, dy=py-cp.y;
  return {dist: Math.sqrt(dx*dx+dy*dy), cp, dx, dy};
}

// ─── BALL–NET COLLISION ───────────────────────────────────────────────────────
function ballNetCollision() {
  const netX = getNetX();
  const netTop = H - vh(NET_HEIGHT_VH);
  const r = vw(C.BALL_RAD);
  if(ball.x + r > netX - NET_THICKNESS/2 && ball.x - r < netX + NET_THICKNESS/2) {
    if(ball.y + r > netTop) {
      // Bounce off net side
      if(ball.x < netX) {
        ball.x = netX - NET_THICKNESS/2 - r;
        ball.vx = -Math.abs(ball.vx) * 0.7;
      } else {
        ball.x = netX + NET_THICKNESS/2 + r;
        ball.vx = Math.abs(ball.vx) * 0.7;
      }
    }
  }
}

// ─── BALL–GROUND COLLISION ────────────────────────────────────────────────────
function ballGroundCollision() {
  const r = vw(C.BALL_RAD);
  if(ball.y + r >= H) {
    ball.y = H - r;
    ball.vy = -Math.abs(ball.vy) * 0.65;
    ball.vx *= 0.9;
  }
}

// ─── BALL–CLUB COLLISION ──────────────────────────────────────────────────────
function ballClubCollision(cl) {
  const r = vw(C.BALL_RAD);
  const segments = cl.getSegments();
  const ld = cl.getLoadDisp();

  // Club velocity (approx)
  // We'll estimate club velocity from release if happening
  let clubVx = cl.jumping ? cl.vx : 0;
  let clubVy = cl.jumping ? cl.vy : 0;

  // If releasing: add release velocity along side1 normal
  if(cl._releaseV && cl._releaseV > 0 && cl._releaseN) {
    clubVx += cl._releaseN.x * cl._releaseV;
    clubVy += cl._releaseN.y * cl._releaseV;
  }

  for(const seg of segments) {
    const {dist, cp, dx, dy} = distToSegment(ball.x, ball.y, seg.p1.x, seg.p1.y, seg.p2.x, seg.p2.y);
    if(dist < r && dist > 0.0001) {
      // Normal from segment toward ball
      const nx = dx/dist, ny = dy/dist;

      // Determine if this is side1 hit or side2 hit
      // side2 hit = ball passes through (no effect)
      if(seg.side === 'side2') {
        // No effect, ball passes through
        continue;
      }

      // Push ball out
      ball.x = cp.x + nx * r * 1.01;
      ball.y = cp.y + ny * r * 1.01;

      // Relative velocity of ball w.r.t. club surface
      const relVx = ball.vx - clubVx;
      const relVy = ball.vy - clubVy;

      // Reflect relative velocity about normal
      const dot = relVx * nx + relVy * ny;
      if(dot < 0) { // only if approaching
        // KIN_LOSS: reflect with energy loss
        const lossF = Math.sqrt(1 - C.KIN_LOSS);
        const newRelVx = relVx - 2 * dot * nx;
        const newRelVy = relVy - 2 * dot * ny;

        ball.vx = (newRelVx * lossF) + clubVx;
        ball.vy = (newRelVy * lossF) + clubVy;
      }

      // Reset release velocity after impact
      cl._releaseV = 0;
      break;
    }
  }
}

// ─── OUT OF BOUNDS CHECK ──────────────────────────────────────────────────────
function checkOutOfBounds() {
  const r = vw(C.BALL_RAD);
  // Out if: right side, left side, top
  if(ball.x - r > W || ball.x + r < 0 || ball.y + r < 0) {
    triggerRestart();
  }
}

let restartTimer = 0;
function triggerRestart() {
  if(countdownActive) return;
  countdownActive = true;
  restartTimer = 2.5;
  setStatus('RESTARTING...');
}

function setStatus(msg) {
  document.getElementById('status-box').textContent = msg;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function gameLoop(ts) {
  if(!lastTime) lastTime = ts;
  let dt = (ts - lastTime) / 1000;
  lastTime = ts;
  dt = Math.min(dt, 0.05); // cap

  // Resize canvas dynamically
  if(canvas.width !== wrapper.clientWidth || canvas.height !== wrapper.clientHeight) {
    resize();
    resetGame();
  }

  if(!paused) {
    if(countdownActive) {
      restartTimer -= dt;
      setStatus(`RESTART IN ${Math.ceil(restartTimer)}...`);
      if(restartTimer <= 0) {
        resetGame();
      }
    } else {
      update(dt);
    }
  }

  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  // Clubs update
  club[0].update(dt, club[1]);
  club[1].update(dt, club[0]);

  // Ball physics
  ball.vy += vh(C.G) * dt;
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Collisions
  ballGroundCollision();
  ballNetCollision();
  ballClubCollision(club[0]);
  ballClubCollision(club[1]);
  checkOutOfBounds();
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#0a0c0a';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = '#1a1e1a';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Ground
  ctx.fillStyle = '#1a2e1a';
  ctx.fillRect(0, H-3, W, 3);
  ctx.strokeStyle = '#39ff14';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, H-3);
  ctx.lineTo(W, H-3);
  ctx.stroke();

  // Net
  const netX = getNetX();
  const netTop = H - vh(NET_HEIGHT_VH);
  // Net post
  ctx.fillStyle = '#2a3a2a';
  ctx.fillRect(netX - NET_THICKNESS/2, netTop, NET_THICKNESS, H - netTop);
  // Net lines
  ctx.strokeStyle = '#39ff1460';
  ctx.lineWidth = 1;
  for(let y=netTop; y<H; y+=8) {
    ctx.beginPath();
    ctx.moveTo(netX - NET_THICKNESS/2, y);
    ctx.lineTo(netX + NET_THICKNESS/2, y);
    ctx.stroke();
  }
  // Net top cap
  ctx.fillStyle = '#39ff14';
  ctx.fillRect(netX - NET_THICKNESS/2 - 2, netTop - 3, NET_THICKNESS + 4, 3);

  // Clubs
  club[0].draw(activeClub === 0);
  club[1].draw(activeClub === 1);

  // Ball
  drawBall();

  // Pause overlay
  if(paused) {
    ctx.fillStyle = '#0008';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#39ff14';
    ctx.font = `bold ${vh(6)}px Orbitron, monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.textAlign = 'left';
  }

  // Countdown overlay
  if(countdownActive) {
    ctx.fillStyle = '#000a';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff6b1a';
    ctx.font = `bold ${vh(5)}px Orbitron, monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`RESTART IN ${Math.ceil(restartTimer)}`, W/2, H/2);
    ctx.textAlign = 'left';
  }
}

function drawBall() {
  const r = vw(C.BALL_RAD);
  const x = ball.x, y = ball.y;

  // Glow
  const grd = ctx.createRadialGradient(x,y,0,x,y,r*2);
  grd.addColorStop(0, '#ffffff40');
  grd.addColorStop(1, '#ffffff00');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(x, y, r*2, 0, Math.PI*2);
  ctx.fill();

  // Ball body
  const ballGrd = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  ballGrd.addColorStop(0, '#e8f0ff');
  ballGrd.addColorStop(0.4, '#c0d0e8');
  ballGrd.addColorStop(1, '#607090');
  ctx.fillStyle = ballGrd;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#ffffff30';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Ball seam
  ctx.strokeStyle = '#80a0c080';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.85, 0.3, Math.PI + 0.3);
  ctx.stroke();
}

// ─── BUTTONS ─────────────────────────────────────────────────────────────────
document.getElementById('btn-restart').addEventListener('click', () => {
  countdownActive = false;
  resetGame();
});

document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  lastTime = null;
});

// ─── INIT ────────────────────────────────────────────────────────────────────
resize();
resetGame();
requestAnimationFrame(gameLoop);
</script>
